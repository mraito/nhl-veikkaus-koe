/* ---- veikkauslomake ---- */
.kirjaudu{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.kentta{display:flex;flex-direction:column;gap:4px}

.tchip{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);cursor:pointer;font-weight:700;font-size:13px;user-select:none}

.valittu{display:flex;align-items:center;gap:8px;background:var(--alive);border-radius:10px;padding:7px 10px;margin-top:6px}

.valittu .tyhjaa{margin-left:auto;color:var(--red);cursor:pointer;font-weight:800;background:none;border:none;font-size:15px}

/* ---- vakiokierros ---- */
.vpaiva{color:var(--mut);font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin:14px 0 4px}
.vrivi{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 10px;border:1px solid var(--line);border-radius:12px;margin:6px 0;background:var(--panel2)}
.vrivi.tuloskohde{border-color:var(--hopea);background:linear-gradient(180deg,#1a1a21,#131318)}
.vrivi .aika{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--mut);min-width:44px}
.vrivi .pari{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;min-width:150px}
.vrivi .pari img{width:22px;height:22px}
.merkit{display:flex;gap:5px;margin-left:auto}
.merkki{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:14px;width:38px;height:34px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--mut);cursor:pointer}
.merkki:hover{border-color:var(--hopea);color:var(--ink)}
.merkki.val{background:#fff;color:#0a0a0d;border-color:#fff}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
firebase.initializeApp(window.FIREBASE_CONFIG);
const db = firebase.firestore();

const onPOpaikalla = t => t.divisionSequence <= 3 || (t.wildcardSequence >= 1 && t.wildcardSequence <= 2);

// ===== PISTELASKENTA =====
function tulosPisteet(v, oikea) {
  if (!v || v.v == null || v.k == null || !oikea) return 0;
  const vVoitto = v.v > v.k, oVoitto = oikea.v > oikea.k;
  if (vVoitto !== oVoitto) return 0;
  if (v.v === oikea.v && v.k === oikea.k) return 4;
  if (v.v === oikea.v || v.k === oikea.k) return 3;
  return 2;
}
function laskePisteet(p, round, results, checkpoints, playerstats, winsMap) {
  const erittely = { vakio: 0, vakioOikein: 0, vakioPelattu: 0, kk: 0, kkPerPvm: {}, mestari: 0, pelaaja: 0 };
  if (round && results) {
    round.kohteet.forEach(g => {
      const oikea = results.tulokset[g.id];
      if (!oikea) return;
      erittely.vakioPelattu++;
      if (g.tulos) {
        const pts = tulosPisteet((p.tulos || {})[g.id], oikea);
        if (pts > 0) erittely.vakioOikein++;
        erittely.vakio += pts * (g.dbl ? 2 : 1);
      } else {
        const oikeaMerkki = oikea.paattyi !== "REG" ? "X" : (oikea.k > oikea.v ? "1" : "2");
        if ((p.vakio || {})[g.id] === oikeaMerkki) { erittely.vakioOikein++; erittely.vakio += 3 * (g.dbl ? 2 : 1); }
      }
    });
  }
  if (checkpoints) {
    const omat = (p.poE || []).concat(p.poW || []);
    Object.keys(checkpoints).sort().forEach(pv => {
      const n = omat.filter(t => checkpoints[pv][t]).length;
      erittely.kkPerPvm[pv] = n; erittely.kk += n;
    });
  }
  if (p.champ && winsMap[p.champ] != null) erittely.mestari = winsMap[p.champ];
  if (p.player && playerstats) {
    const id = String(p.player.id);
    if (p.player.pos === "MV") erittely.pelaaja = 6 * (playerstats.nollapelit[id] || 0);
    else erittely.pelaaja = (p.player.pos === "P" ? 2 : 0.5) * (playerstats.maalit[id] || 0);
  }
  erittely.yhteensa = erittely.vakio + erittely.kk + erittely.mestari + erittely.pelaaja;
  return erittely;
}
function splitPot(potti) {
  const osuudet = [0.6, 0.3, 0.1].map(o => Math.floor(potti * o));
  osuudet[0] += potti - osuudet.reduce((a, b) => a + b, 0);  // jäännös 1. sijalle
  return osuudet;
}
const fmtP = (n) => (Math.round(n * 10) / 10).toLocaleString("fi-FI");

const VKL = ["su", "ma", "ti", "ke", "to", "pe", "la"];
const pvmTxt = (pvm) => VKL[new Date(pvm).getUTCDay()] + " " + pvm.slice(8, 10) + "." + pvm.slice(5, 7) + ".";

function Chipit({ rivit }) {
  const [auki, setAuki] = useState(false);
  const nayta = auki ? rivit : rivit.slice(0, 3);
  return (
    <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginTop: 5 }}>
      {nayta.map((r, i) =>
        <span key={i} className="pill" style={{ background: r.pts > 0 ? "rgba(57,229,124,.14)" : "rgba(200,204,214,.08)",
          color: r.pts > 0 ? "var(--grn)" : "var(--mut)" }}>{r.txt}</span>)}
      {rivit.length > 3 &&
        <span className="pill s" style={{ cursor: "pointer" }} onClick={() => setAuki(!auki)}>
          {auki ? "▴" : "+" + (rivit.length - 3) + " ▾"}</span>}
    </div>
  );
}

function TulosKortit({ preds, round, results, schedule, logot }) {
  const pelatut = round.kohteet.filter(g => results && results.tulokset[g.id])
    .sort((a, b) => b.pvm.localeCompare(a.pvm)).slice(0, 5);
  const tulevatKohteet = round.kohteet.filter(g => !results || !results.tulokset[g.id])
    .sort((a, b) => a.pvm.localeCompare(b.pvm)).slice(0, 5);
  const liigaTulevat = (!tulevatKohteet.length && schedule)
    ? schedule.ottelut.filter(g => g.alkaaUTC > "2026-01-31").slice(0, 5) : [];
  const merkkiTxt = (t) => t.paattyi !== "REG" ? "X" : (t.k > t.v ? "1" : "2");
  return (
    <div className="gridx two">
      <div className="card" style={{ margin: 0 }}>
        <h2>Viime kohteet</h2>
        {pelatut.map(g => {
          const t = results.tulokset[g.id];
          const chipit = preds.map(p => {
            if (g.tulos) {
              const v = (p.tulos || {})[g.id];
              const pts = tulosPisteet(v, t);
              return { pts, txt: (v && v.v != null && v.k != null ? v.v + "–" + v.k : "–") + " " + p.name + (pts ? " +" + pts : "") };
            }
            const m = (p.vakio || {})[g.id];
            const pts = m === merkkiTxt(t) ? 3 * (g.dbl ? 2 : 1) : 0;
            return { pts, txt: (m || "–") + " " + p.name + (pts ? " +" + pts : "") };
          }).sort((a, b) => b.pts - a.pts);
          return (
            <div key={g.id} style={{ padding: "9px 0", borderBottom: "1px dashed var(--line)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span className="tiny" style={{ minWidth: 60 }}>{pvmTxt(g.pvm)}</span>
                <img src={logot[g.vieras]} alt="" style={{ width: 20, height: 20 }} /><b>{g.vieras}</b>
                <span className="mono" style={{ fontWeight: 600 }}>{t.v}–{t.k}</span>
                <b>{g.koti}</b><img src={logot[g.koti]} alt="" style={{ width: 20, height: 20 }} />
                {t.paattyi !== "REG" && <span className="tagi">{t.paattyi === "OT" ? "JA" : "VL"}</span>}
                {g.tulos ? <span className="tulospilli">TULOS</span> :
                  <span className="pill s">merkki {merkkiTxt(t)}</span>}
              </div>
              <Chipit rivit={chipit} />
            </div>
          );
        })}
      </div>
      <div className="card" style={{ margin: 0 }}>
        <h2>Tulossa seuraavaksi</h2>
        {tulevatKohteet.length > 0 ? tulevatKohteet.map(g => (
          <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: "1px dashed var(--line)" }}>
            <span className="tiny" style={{ minWidth: 60 }}>{pvmTxt(g.pvm)}</span>
            <span className="tiny">{g.klo}</span>
            <img src={logot[g.vieras]} alt="" style={{ width: 20, height: 20 }} /><b>{g.vieras}</b>
            <span style={{ color: "var(--mut)" }}>@</span>
            <b>{g.koti}</b><img src={logot[g.koti]} alt="" style={{ width: 20, height: 20 }} />
            {g.tulos && <span className="tulospilli">TULOS</span>}
          </div>
        )) : liigaTulevat.length > 0 ? (
          <div>
            <div className="tiny" style={{ marginBottom: 6 }}>Kaikki 1. puolikkaan kohteet on pelattu — liigan seuraavat ottelut:</div>
            {liigaTulevat.map(g => {
              const fi = new Date(new Date(g.alkaaUTC).getTime() + 2 * 3600 * 1000);
              return (
                <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 0", borderBottom: "1px dashed var(--line)" }}>
                  <span className="tiny" style={{ minWidth: 60 }}>{pvmTxt(fi.toISOString().slice(0, 10))}</span>
                  <span className="tiny">{fi.toISOString().slice(11, 16)}</span>
                  <img src={logot[g.vieras]} alt="" style={{ width: 20, height: 20 }} /><b>{g.vieras}</b>
                  <span style={{ color: "var(--mut)" }}>@</span>
                  <b>{g.koti}</b><img src={logot[g.koti]} alt="" style={{ width: 20, height: 20 }} />
                </div>
              );
            })}
          </div>
        ) : <div className="tiny">Ei tulevia kohteita.</div>}
      </div>
    </div>
  );
}

function ValitutPorssit({ preds, playerstats, winsMap, logot, nimetMap }) {
  // Mestarijoukkueet
  const mestarit = {};
  preds.forEach(p => { if (p.champ) (mestarit[p.champ] = mestarit[p.champ] || []).push(p.name); });
  const mRivit = Object.keys(mestarit).map(ab => ({ ab, valinneet: mestarit[ab], pts: winsMap[ab] || 0 }))
    .sort((a, b) => b.pts - a.pts);
  // Valitut pelaajat
  const pelaajat = {};
  preds.forEach(p => {
    if (!p.player) return;
    const id = String(p.player.id);
    if (!pelaajat[id]) pelaajat[id] = { p: p.player, valinneet: [] };
    pelaajat[id].valinneet.push(p.name);
  });
  const posTxt = { H: "hyökkääjä", P: "puolustaja", MV: "maalivahti" };
  const pRivit = Object.values(pelaajat).map(r => {
    const id = String(r.p.id);
    const maara = r.p.pos === "MV" ? (playerstats && playerstats.nollapelit[id]) || 0 : (playerstats && playerstats.maalit[id]) || 0;
    const pts = r.p.pos === "MV" ? 6 * maara : (r.p.pos === "P" ? 2 : 0.5) * maara;
    return Object.assign({ maara, pts }, r);
  }).sort((a, b) => b.pts - a.pts);
  return (
    <div className="gridx two" style={{ marginTop: 14 }}>
      <div className="card" style={{ margin: 0 }}>
        <h2>Pistepörssi — mestarijoukkueet</h2>
        {mRivit.map((r, i) => (
          <div key={r.ab} style={{ padding: "8px 0", borderBottom: "1px solid #1c1c22" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <span className="sija" style={{ fontFamily: "'Anton'", width: 20, color: "var(--mut)" }}>{i + 1}</span>
              <img src={logot[r.ab]} alt="" style={{ width: 24, height: 24 }} />
              <b>{nimetMap[r.ab] || r.ab}</b>
              <span className="pill s">{r.pts} voittoa · {r.pts} p</span>
            </div>
            <div className="tiny" style={{ marginLeft: 29, marginTop: 3 }}>Valinnut: {r.valinneet.join(", ")}</div>
          </div>
        ))}
        {mRivit.length === 0 && <div className="tiny">Ei vielä valintoja.</div>}
      </div>
      <div className="card" style={{ margin: 0 }}>
        <h2>Pistepörssi — valitut pelaajat</h2>
        {pRivit.map((r, i) => (
          <div key={r.p.id} style={{ padding: "8px 0", borderBottom: "1px solid #1c1c22" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <span className="sija" style={{ fontFamily: "'Anton'", width: 20, color: "var(--mut)" }}>{i + 1}</span>
              <img src={r.p.kuva} alt="" style={{ width: 30, height: 30, borderRadius: "50%", background: "var(--alive)" }} />
              <b>{r.p.nimi}</b>
              <span className="tiny">{posTxt[r.p.pos]}</span>
              <span className="pill s">{r.maara} {r.p.pos === "MV" ? "nollapeliä" : "maalia"} · {fmtP(r.pts)} p</span>
            </div>
            <div className="tiny" style={{ marginLeft: 39, marginTop: 3 }}>Valinnut: {r.valinneet.join(", ")}</div>
          </div>
        ))}
        {pRivit.length === 0 && <div className="tiny">Ei vielä valintoja.</div>}
      </div>
    </div>
  );
}

function Tulostaulukko({ preds, round, results, checkpoints, playerstats, standings, stake }) {
  const [auki, setAuki] = useState(null);
  const winsMap = {}, logot = {}, nimetMap = {};
  standings.forEach(t => { winsMap[t.teamAbbrev.default] = t.wins; logot[t.teamAbbrev.default] = t.teamLogo; nimetMap[t.teamAbbrev.default] = t.teamName.default; });
  const rivit = preds.map(p => ({ p, e: laskePisteet(p, round, results, checkpoints, playerstats, winsMap) }))
    .sort((a, b) => b.e.yhteensa - a.e.yhteensa);
  const potti = preds.length * stake;
  const palkinnot = splitPot(potti);
  const mitalit = ["🥇", "🥈", "🥉"];
  if (preds.length === 0) return (
    <div className="card"><h2>Tulostaulukko</h2>
      <div className="note">Ei vielä osallistujia — käy tekemässä veikkaus Veikkaus-välilehdellä!</div></div>);
  return (
    <div className="card">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <h2 style={{ margin: 0 }}>Tulostaulukko</h2>
        <span className="tiny">Potti {potti} € · jako {palkinnot.join(" € / ")} €</span>
      </div>
      <div className="tiny" style={{ margin: "4px 0 10px" }}>Pisteissä mukana: vakiokohteet, kuukausipisteet, oma mestari ja oma pelaaja. Kausiveikkauksen kohteet ratkeavat runkosarjan päättyessä.</div>
      {rivit.map(({ p, e }, i) => (
        <div key={p.name} style={{ borderTop: "1px solid var(--line)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 2px", cursor: "pointer" }}
               onClick={() => setAuki(auki === p.name ? null : p.name)}>
            <span className="sija" style={{ fontFamily: "'Anton'", width: 30, color: i < 3 ? "var(--ink)" : "var(--mut)" }}>
              {mitalit[i] || (i + 1) + "."}</span>
            {p.champ && <img src={logot[p.champ]} alt="" style={{ width: 26, height: 26 }} title={"Mestari: " + (nimetMap[p.champ] || p.champ)} />}
            <b style={{ fontSize: 15 }}>{p.name}</b>
            <span className="pill s" title="Vakiokohteet oikein">{e.vakioOikein}/{e.vakioPelattu}</span>
            <span className="arvo" style={{ marginLeft: "auto", fontFamily: "'Spline Sans Mono',monospace", fontWeight: 600, fontSize: 18 }}>
              {fmtP(e.yhteensa)} p</span>
            <span style={{ color: "var(--mut)" }}>{auki === p.name ? "▾" : "›"}</span>
          </div>
          {auki === p.name && (
            <div style={{ padding: "0 2px 12px 40px", display: "grid", gap: 4, fontSize: 13 }}>
              <div>Vakiokohteet: <b className="mono">{fmtP(e.vakio)} p</b> <span className="tiny">({e.vakioOikein} oikein / {e.vakioPelattu} pelattua)</span></div>
              <div>Kuukausipisteet: <b className="mono">{e.kk} p</b> <span className="tiny">
                ({Object.keys(e.kkPerPvm).sort().map(pv => pv.slice(8,10) + "." + pv.slice(5,7) + ". +" + e.kkPerPvm[pv]).join(" · ")})</span></div>
              <div>Oma mestari{p.champ ? " (" + p.champ + ")" : ""}: <b className="mono">{e.mestari} p</b> <span className="tiny">(1 p / voitto)</span></div>
              <div>Oma pelaaja{p.player ? " (" + p.player.nimi + ", " + p.player.pos + ")" : ""}: <b className="mono">{fmtP(e.pelaaja)} p</b></div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function Divisioonat({ standings }) {
  const divit = {};
  standings.forEach(t => { (divit[t.divisionName] = divit[t.divisionName] || []).push(t); });
  return Object.keys(divit).map(dn => {
    const rivit = divit[dn].slice().sort((a, b) => a.divisionSequence - b.divisionSequence);
    return (
      <div key={dn}>
        <div className="divh">{dn}</div>
        <SarjataulukkoTaulu rivit={rivit} viivaIndex={2} />
      </div>
    );
  });
}

function Konferenssit({ standings }) {
  const confit = { E: "Itäinen konferenssi", W: "Läntinen konferenssi" };
  return Object.keys(confit).map(c => {
    const joukkueet = standings.filter(t => t.conferenceAbbrev === c);
    // Wild card -näkymä: divisioonien top 3:t ensin, sitten loput wild card -järjestyksessä
    const top3 = joukkueet.filter(t => t.divisionSequence <= 3)
      .sort((a, b) => a.divisionAbbrev.localeCompare(b.divisionAbbrev) || a.divisionSequence - b.divisionSequence);
    const loput = joukkueet.filter(t => t.divisionSequence > 3)
      .sort((a, b) => a.wildcardSequence - b.wildcardSequence);
    const rivit = top3.concat(loput);
    return (
      <div key={c}>
        <div className="divh">{confit[c]}</div>
        <SarjataulukkoTaulu rivit={rivit} viivaIndex={7} />
        <div className="tiny" style={{ margin: "4px 0 10px" }}>Keltainen katkoviiva = playoff-raja (wild card 2). Vihreä reuna = playoff-paikalla.</div>
      </div>
    );
  });
}

function VakioOsa({ round, picks, setPicks, lukittu, logot }) {
  if (!round) return <div className="note">Vakiokierrosta ei ole vielä julkaistu.</div>;
  const vk = ["su", "ma", "ti", "ke", "to", "pe", "la"];
  const kkNimet = { "10": "Lokakuu", "11": "Marraskuu", "12": "Joulukuu", "01": "Tammikuu", "02": "Helmikuu", "03": "Maaliskuu", "04": "Huhtikuu" };
  const asetaMerkki = (id, m) => { if (lukittu) return;
    setPicks(Object.assign({}, picks, { vakio: Object.assign({}, picks.vakio, { [id]: picks.vakio[id] === m ? null : m }) })); };
  const asetaTulos = (id, kentta, arvo) => { if (lukittu) return;
    const n = arvo === "" ? null : Math.max(0, Math.min(15, parseInt(arvo, 10) || 0));
    const vanha = picks.tulos[id] || { v: null, k: null };
    setPicks(Object.assign({}, picks, { tulos: Object.assign({}, picks.tulos, { [id]: Object.assign({}, vanha, { [kentta]: n }) }) })); };
  let edKk = "", edPvm = "";
  return (
    <div>
      <div className="note">Tavalliset kohteet 1X2:lla (1 = kotivoitto varsinaisella ajalla, X = jatkoaika/voittolaukaukset, 2 = vierasvoitto varsinaisella ajalla; 3 p). Lauantain <b>tuloskohteessa</b> veikataan lopputulos: täysosuma 4 p · voittaja + toisen joukkueen maalit 3 p · voittaja 2 p.</div>
      {round.kohteet.map(g => {
        const kk = g.pvm.slice(5, 7), pvmTxt = vk[new Date(g.pvm).getUTCDay()] + " " + g.pvm.slice(8, 10) + "." + kk + ".";
        const kkOtsikko = kk !== edKk ? <div className="divh">{kkNimet[kk] || kk}</div> : null;
        edKk = kk;
        const naytaPvm = g.pvm !== edPvm; edPvm = g.pvm;
        const t = picks.tulos[g.id] || {};
        return (
          <div key={g.id}>
            {kkOtsikko}
            {naytaPvm && <div className="vpaiva">{pvmTxt}</div>}
            <div className={"vrivi" + (g.tulos ? " tuloskohde" : "")}>
              <span className="aika">{g.klo}</span>
              <span className="pari"><img src={logot[g.vieras]} alt="" />{g.vieras} @ <img src={logot[g.koti]} alt="" />{g.koti}</span>
              {g.tulos ? (
                <span className="merkit" style={{ alignItems: "center", gap: 7 }}>
                  <span className="tulospilli">TULOSKOHDE</span>
                  <input className="tulosinput" inputMode="numeric" placeholder={g.vieras} disabled={lukittu}
                         value={t.v == null ? "" : t.v} onChange={e => asetaTulos(g.id, "v", e.target.value.replace(/\D/g, ""))} />
                  <span style={{ color: "var(--mut)" }}>–</span>
                  <input className="tulosinput" inputMode="numeric" placeholder={g.koti} disabled={lukittu}
                         value={t.k == null ? "" : t.k} onChange={e => asetaTulos(g.id, "k", e.target.value.replace(/\D/g, ""))} />
                </span>
              ) : (
                <span className="merkit">
                  {["1", "X", "2"].map(m =>
                    <button key={m} disabled={lukittu} className={"merkki" + (picks.vakio[g.id] === m ? " val" : "")}
                            onClick={() => asetaMerkki(g.id, m)}>{m}</button>)}
                </span>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Veikkaus({ standings, rosters, round, lukittu }) {
  const [nimi, setNimi] = useState("");
  const [pin, setPin] = useState("");
  const [kirjautunut, setKirjautunut] = useState(false);
  const [viesti, setViesti] = useState("");
  const [tallennettu, setTallennettu] = useState("");
  const tyhja = { poE: [], poW: [], div: {}, pres: "", artRoss: null, finn: null, champ: "", player: null, vakio: {}, tulos: {} };
  const [osa, setOsa] = useState("kausi");
  const [picks, setPicks] = useState(tyhja);

  const joukkueet = standings.slice().sort((a, b) => a.teamName.default.localeCompare(b.teamName.default));
  const divit = {};
  standings.forEach(t => { (divit[t.divisionName] = divit[t.divisionName] || []).push(t); });
  const kaikkiPelaajat = Object.values(rosters).flatMap(t =>
    t.pelaajat.map(p => Object.assign({ joukkue: t.joukkue }, p)));

  const [osallistujat, setOsallistujat] = useState([]);
  const [avattava, setAvattava] = useState("");   // palaajan valitsema nimi (PIN-kysely auki)
  useEffect(() => {
    db.collection("nhlpredictions").get()
      .then(qs => setOsallistujat(qs.docs.map(d => d.id).sort((a, b) => a.localeCompare(b, "fi"))))
      .catch(() => {});
  }, [kirjautunut]);

  const aloitaUusi = () => {
    const n = nimi.trim();
    if (!n) { setViesti("Anna nimi."); return; }
    if (osallistujat.some(o => o.toLowerCase() === n.toLowerCase())) {
      setViesti("Tämä nimi on jo käytössä — jos se olet sinä, valitse nimesi alta kohdasta \u201dPalaatko muokkaamaan\u201d."); return;
    }
    if (!/^\d{4}$/.test(pin)) { setViesti("Keksi 4-numeroinen PIN."); return; }
    if (lukittu) { setViesti("Veikkaus on lukittu — uusia osallistujia ei voi enää lisätä."); return; }
    setViesti(""); setPicks(tyhja); setKirjautunut(true);
  };

  const avaaVanha = () => {
    if (!/^\d{4}$/.test(pin)) { setViesti("PIN on 4 numeroa."); return; }
    setViesti("");
    db.collection("nhlpredictions").doc(avattava).get().then(snap => {
      if (!snap.exists) { setViesti("Veikkausta ei löytynyt."); return; }
      const d = snap.data();
      if (d.pin !== pin) { setViesti("Väärä PIN."); return; }
      setNimi(avattava);
      setPicks({
        poE: d.poE || [], poW: d.poW || [], div: d.div || {}, pres: d.pres || "",
        artRoss: d.artRoss || null, finn: d.finn || null, champ: d.champ || "", player: d.player || null,
        vakio: d.vakio || {}, tulos: d.tulos || {}
      });
      setAvattava(""); setKirjautunut(true);
    }).catch(e => setViesti("Yhteysvirhe: " + e.message));
  };

  const togglePO = (t) => {
    if (lukittu) return;
    const avain = t.conferenceAbbrev === "E" ? "poE" : "poW";
    const lista = picks[avain];
    const ab = t.teamAbbrev.default;
    let uusi;
    if (lista.includes(ab)) uusi = lista.filter(x => x !== ab);
    else { if (lista.length >= 8) return; uusi = lista.concat([ab]); }
    setPicks(Object.assign({}, picks, { [avain]: uusi }));
  };

  const asetaChamp = (ab) => {
    if (lukittu) return;
    const p = Object.assign({}, picks, { champ: ab });
    if (picks.player && picks.player.joukkue !== ab) p.player = null; // pelaaja mestarijoukkueesta!
    setPicks(p);
  };

  const puutteet = [];
  if (picks.poE.length < 8) puutteet.push("Itä: " + picks.poE.length + "/8 playoff-joukkuetta");
  if (picks.poW.length < 8) puutteet.push("Länsi: " + picks.poW.length + "/8 playoff-joukkuetta");
  if (Object.keys(picks.div).filter(k => picks.div[k]).length < 4) puutteet.push("Divisioonavoittajat");
  if (!picks.pres) puutteet.push("Presidents' Trophy");
  if (!picks.artRoss) puutteet.push("Pistepörssin voittaja");
  if (!picks.finn) puutteet.push("Paras suomalainen");
  if (!picks.champ) puutteet.push("Oma mestari");
  if (!picks.player) puutteet.push("Oma pelaaja");
  if (round) {
    const veikattu = round.kohteet.filter(g => g.tulos
      ? (picks.tulos[g.id] && picks.tulos[g.id].v != null && picks.tulos[g.id].k != null)
      : !!picks.vakio[g.id]).length;
    if (veikattu < round.kohteet.length) puutteet.push("Vakiokohteita " + veikattu + "/" + round.kohteet.length);
  }

  const tallenna = () => {
    if (lukittu) return;
    setTallennettu("");
    const doc = Object.assign({ name: nimi.trim(), pin: pin, savedAt: new Date().toISOString() }, picks);
    db.collection("nhlpredictions").doc(nimi.trim()).set(doc)
      .then(() => setTallennettu("Tallennettu " + new Date().toLocaleTimeString("fi-FI") + "! Voit muokata valintoja lukitukseen asti."))
      .catch(e => setViesti("Tallennus epäonnistui: " + e.message));
  };

  const mestariJoukkue = picks.champ ? standings.find(t => t.teamAbbrev.default === picks.champ) : null;
  const mestariRosteri = picks.champ && rosters[picks.champ] ? rosters[picks.champ].pelaajat : [];
  const posNimi = { H: "Hyökkääjät (0,5 p/maali)", P: "Puolustajat (2 p/maali)", MV: "Maalivahdit (6 p/nollapeli)" };

  if (!kirjautunut && avattava) return (
    <div className="card">
      <h2>🔒 Avaa veikkaus: {avattava}</h2>
      <div className="tiny" style={{ marginBottom: 10 }}>Syötä PIN-koodisi päästäksesi katsomaan ja muokkaamaan veikkaustasi.</div>
      <div className="kirjaudu">
        <input type="password" inputMode="numeric" autoFocus placeholder="PIN" value={pin}
               onChange={e => setPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
               onKeyDown={e => { if (e.key === "Enter") avaaVanha(); }} style={{ width: 110 }} />
        <button className="act" onClick={avaaVanha}>Avaa</button>
        <button className="ghost" onClick={() => { setAvattava(""); setPin(""); setViesti(""); }}>Peruuta</button>
      </div>
      {viesti && <div className="note" style={{ color: "var(--amb)" }}>{viesti} Jos olet unohtanut PIN-koodisi, järjestäjä voi nollata sen.</div>}
    </div>
  );

  if (!kirjautunut) return (
    <div className="card">
      <h2>Kuka olet?</h2>
      <div className="note">Näin veikkaat: aloita uutena veikkaajana, tee valintasi ja tallenna. Voit palata muokkaamaan milloin vain lukitukseen asti. Tarkemmat säännöt Säännöt-välilehdellä.</div>
      <div className="lab">Uusi veikkaaja</div>
      <div className="kirjaudu" style={{ marginTop: 6 }}>
        <div className="kentta"><span className="lab">Nimi</span>
          <input value={nimi} onChange={e => setNimi(e.target.value)} placeholder="Etunimi (+ sukunimen alkukirjain)" style={{ minWidth: 200 }} /></div>
        <div className="kentta"><span className="lab">Keksi PIN (4 numeroa)</span>
          <input value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, "").slice(0, 4))} inputMode="numeric" placeholder="••••" style={{ width: 110 }} /></div>
        <button className="act" onClick={aloitaUusi}>Aloita</button>
      </div>
      <div className="tiny" style={{ marginTop: 6 }}>Paina PIN mieleen — tarvitset sitä aina, kun palaat muokkaamaan.</div>
      {osallistujat.length > 0 && <div>
        <div className="osio"><div className="lab">Palaatko muokkaamaan? Valitse nimesi</div>
          <select style={{ marginTop: 6, minWidth: 220 }} value=""
                  onChange={e => { if (e.target.value) { setAvattava(e.target.value); setPin(""); setViesti(""); } }}>
            <option value="">— valitse nimesi —</option>
            {osallistujat.map(o => <option key={o} value={o}>{o} 🔒</option>)}
          </select>
        </div>
      </div>}
      {lukittu && <div className="note" style={{ color: "var(--amb)" }}>🔒 Veikkaukset on lukittu — uusia ei voi lisätä, mutta omaa voi katsella.</div>}
      {viesti && <div className="note" style={{ color: "var(--amb)" }}>{viesti}</div>}
    </div>
  );

  return (
    <div className="card">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <h2 style={{ margin: 0 }}>Veikkaus — {nimi.trim()}</h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {lukittu && <span className="pill y">LUKITTU</span>}
          <button className="ghost" onClick={() => { setKirjautunut(false); setTallennettu(""); }}>Kirjaudu ulos</button>
        </div>
      </div>
      <div style={{ margin: "10px 0" }}>
        <div className="seg">
          <button className={"segb" + (osa === "kausi" ? " on" : "")} onClick={() => setOsa("kausi")}>Kausiveikkaus</button>
          <button className={"segb" + (osa === "vakio" ? " on" : "")} onClick={() => setOsa("vakio")}>Vakiokierros 1</button>
        </div>
      </div>

      {osa === "vakio" && <VakioOsa round={round} picks={picks} setPicks={setPicks} lukittu={lukittu}
        logot={Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.teamLogo]))} />}

      {osa === "kausi" && <div>
      <div className="osio"><div className="ots">1 · Playoff-joukkueet</div>
        <div className="kuv">Valitse 8 joukkuetta molemmista konferensseista, jotka pääsevät playoffeihin. 2 p / oikea + kuukausipisteet pitkin kautta.</div>
        {[["E", "Itäinen konferenssi", "poE"], ["W", "Läntinen konferenssi", "poW"]].map(([c, otsikko, avain]) => (
          <div key={c}>
            <div className="lab" style={{ margin: "8px 0 2px" }}>{otsikko} — valittu {picks[avain].length}/8</div>
            <div className="chipgrid">
              {joukkueet.filter(t => t.conferenceAbbrev === c).map(t => {
                const val = picks[avain].includes(t.teamAbbrev.default);
                return (
                  <div key={t.teamAbbrev.default}
                       className={"tchip" + (val ? " val" : "") + (lukittu ? " lukossa" : "")}
                       onClick={() => togglePO(t)}>
                    <img src={t.teamLogo} alt="" />{t.teamName.default}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div className="osio"><div className="ots">2 · Divisioonavoittajat</div>
        <div className="kuv">3 p / oikea voittaja.</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          {Object.keys(divit).map(dn => (
            <div className="kentta" key={dn}><span className="lab">{dn}</span>
              <select disabled={lukittu} value={picks.div[dn] || ""}
                      onChange={e => setPicks(Object.assign({}, picks, { div: Object.assign({}, picks.div, { [dn]: e.target.value }) }))}>
                <option value="">— valitse —</option>
                {divit[dn].slice().sort((a, b) => a.teamName.default.localeCompare(b.teamName.default))
                  .map(t => <option key={t.teamAbbrev.default} value={t.teamAbbrev.default}>{t.teamName.default}</option>)}
              </select></div>
          ))}
        </div>
      </div>

      <div className="osio"><div className="ots">3 · Presidents' Trophy</div>
        <div className="kuv">Runkosarjan paras joukkue. 5 p.</div>
        <select disabled={lukittu} value={picks.pres}
                onChange={e => setPicks(Object.assign({}, picks, { pres: e.target.value }))}>
          <option value="">— valitse —</option>
          {joukkueet.map(t => <option key={t.teamAbbrev.default} value={t.teamAbbrev.default}>{t.teamName.default}</option>)}
        </select>
      </div>

      <div className="osio"><div className="ots">4 · Pistepörssin voittaja (Art Ross)</div>
        <div className="kuv">10 p oikein · 5 p jos top 3.</div>
        {lukittu && !picks.artRoss ? <div className="tiny">—</div> :
          <PelaajaHaku pelaajat={kaikkiPelaajat} value={picks.artRoss}
                       onChange={p => !lukittu && setPicks(Object.assign({}, picks, { artRoss: p }))} />}
      </div>

      <div className="osio"><div className="ots">5 · Paras suomalainen pistemies</div>
        <div className="kuv">8 p oikein · 4 p jos top 3 suomalaisista. (Haku näyttää toistaiseksi kaikki pelaajat — valitse suomalainen!)</div>
        {lukittu && !picks.finn ? <div className="tiny">—</div> :
          <PelaajaHaku pelaajat={kaikkiPelaajat} value={picks.finn}
                       onChange={p => !lukittu && setPicks(Object.assign({}, picks, { finn: p }))} />}
      </div>

      <div className="osio"><div className="ots">6 · Oma mestari</div>
        <div className="kuv">Stanley Cup -voittajasi. 1 p / voitto runkosarjassa, 2 p / voitto playoffeissa — pisteitä lähes joka illasta!</div>
        <select disabled={lukittu} value={picks.champ} onChange={e => asetaChamp(e.target.value)}>
          <option value="">— valitse —</option>
          {joukkueet.map(t => <option key={t.teamAbbrev.default} value={t.teamAbbrev.default}>{t.teamName.default}</option>)}
        </select>
        {mestariJoukkue &&
          <div className="valittu"><img src={mestariJoukkue.teamLogo} alt="" style={{ borderRadius: 0, background: "transparent" }} />
            <b>{mestariJoukkue.teamName.default}</b></div>}
      </div>

      <div className="osio"><div className="ots">7 · Oma pelaaja</div>
        <div className="kuv">Pakko valita mestarijoukkueestasi! Hyökkääjä 0,5 p/maali · puolustaja 2 p/maali · maalivahti 6 p/nollapeli.</div>
        {!picks.champ ? <div className="note">Valitse ensin oma mestari (kohta 6) — pelaajalista aukeaa sen joukkueesta.</div> :
          <div>
            <select disabled={lukittu} value={picks.player ? String(picks.player.id) : ""}
                    onChange={e => {
                      const p = mestariRosteri.find(x => String(x.id) === e.target.value);
                      setPicks(Object.assign({}, picks, { player: p ? Object.assign({ joukkue: picks.champ }, p) : null }));
                    }}>
              <option value="">— valitse pelaaja ({picks.champ}) —</option>
              {["H", "P", "MV"].map(pos =>
                <optgroup key={pos} label={posNimi[pos]}>
                  {mestariRosteri.filter(p => p.pos === pos).slice().sort((a, b) => a.nimi.localeCompare(b.nimi))
                    .map(p => <option key={p.id} value={String(p.id)}>{p.nimi}{p.numero ? " #" + p.numero : ""}</option>)}
                </optgroup>)}
            </select>
            {picks.player &&
              <div className="valittu"><img src={picks.player.kuva} alt="" />
                <span><b>{picks.player.nimi}</b> <span className="tiny">{picks.player.joukkue} · {posNimi[picks.player.pos]}</span></span></div>}
          </div>}
      </div>

      </div>}

      <div className="osio">
        {puutteet.length > 0
          ? <div className="puuttuu">Vielä puuttuu: {puutteet.join(" · ")}. Voit silti tallentaa ja jatkaa myöhemmin.</div>
          : <div className="okvihrea">Kaikki valinnat tehty! ✓</div>}
        <div style={{ marginTop: 10, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <button className="act" onClick={tallenna} disabled={lukittu}>Tallenna veikkaus</button>
          {tallennettu && <span className="okvihrea">{tallennettu}</span>}
        </div>
        {viesti && <div className="note" style={{ color: "var(--amb)" }}>{viesti}</div>}
        <div className="tiny" style={{ marginTop: 8 }}>Muista tallentaa! Valinnat eivät tallennu itsestään. Ennen lukitusta voit muokata veikkaustasi rajattomasti kirjautumalla samalla nimellä ja PIN-koodilla.</div>
      </div>
    </div>
  );
}

function Tulossa({ nimi }) {
  return (
    <div className="card tulossa">
      <div className="iso">{nimi}</div>
      <div>Tämä osio rakennetaan seuraavaksi. Koeversio etenee pala kerrallaan.</div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("tulos");
  const [sarjaNakyma, setSarjaNakyma] = useState("div");
  const [standings, setStandings] = useState(null);
  const [scores, setScores] = useState(null);
  const [leaders, setLeaders] = useState(null);
  const [goalies, setGoalies] = useState(null);
  const [meta, setMeta] = useState(null);
  const [rosters, setRosters] = useState(null);
  const [config, setConfig] = useState({ locked1: false });
  const [round, setRound] = useState(null);
  const [results, setResults] = useState(null);
  const [checkpoints, setCheckpoints] = useState(null);
  const [playerstats, setPlayerstats] = useState(null);
  const [preds, setPreds] = useState([]);
  const [schedule, setSchedule] = useState(null);
  const [virhe, setVirhe] = useState("");

  useEffect(() => {
    Promise.all(["standings", "scores", "leaders", "goalies", "meta", "rosters"].map(n =>
      fetch("data/" + n + ".json").then(r => { if (!r.ok) throw new Error("data/" + n + ".json: HTTP " + r.status); return r.json(); })
    )).then(([st, sc, ld, gl, me, ro]) => {
      setStandings(st.standings); setScores(sc); setLeaders(ld); setGoalies(gl); setMeta(me); setRosters(ro);
    }).catch(e => setVirhe(e.message));
    fetch("data/round1.json").then(r => r.ok ? r.json() : null).then(setRound).catch(() => setRound(null));
    fetch("data/results1.json").then(r => r.ok ? r.json() : null).then(setResults).catch(() => setResults(null));
    fetch("data/checkpoints.json").then(r => r.ok ? r.json() : null).then(setCheckpoints).catch(() => setCheckpoints(null));
    fetch("data/playerstats.json").then(r => r.ok ? r.json() : null).then(setPlayerstats).catch(() => setPlayerstats(null));
    fetch("data/schedule.json").then(r => r.ok ? r.json() : null).then(setSchedule).catch(() => setSchedule(null));
    db.collection("nhlpredictions").get()
      .then(qs => setPreds(qs.docs.map(d => d.data())))
      .catch(() => {});
    db.collection("nhl27").doc("config").get()
      .then(snap => { if (snap.exists) setConfig(snap.data()); })
      .catch(() => {});
  }, []);

  const TABS = [["tulos", "Tulostaulukko"], ["sarja", "Sarjataulukko"], ["veikkaus", "Veikkaus"], ["saannot", "Säännöt"], ["org", "Järjestäjä"]];

  return (
    <div className="wrap">
      <Hero standings={standings} />
      <div className="tabs">
        {TABS.map(([id, nimi]) =>
          <button key={id} className={"tab" + (tab === id ? " on" : "")} onClick={() => setTab(id)}>{nimi}</button>)}
      </div>

      {virhe && <div className="note" style={{ color: "var(--red)" }}>Datan lataus epäonnistui: {virhe}</div>}

      {tab === "tulos" && (
        <div>
          {standings && round ? (() => {
            const logot = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.teamLogo]));
            const nimetMap = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.teamName.default]));
            const winsMap = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.wins]));
            return (
              <div>
                <TulosKortit preds={preds} round={round} results={results} schedule={schedule} logot={logot} />
                <ValitutPorssit preds={preds} playerstats={playerstats} winsMap={winsMap} logot={logot} nimetMap={nimetMap} />
                <Tulostaulukko preds={preds} round={round} results={results} checkpoints={checkpoints}
                               playerstats={playerstats} standings={standings} stake={config.stake != null ? config.stake : 10} />
              </div>
            );
          })() : <div className="card tiny">Ladataan…</div>}
        </div>
      )}

      {tab === "sarja" && (
        <div className="card">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
            <h2 style={{ margin: 0 }}>Sarjataulukko <span className="pill s">31.1.2026</span></h2>
            <div className="seg">
              {[["div", "Divisioonat"], ["conf", "Konferenssit"], ["porssi", "Pörssit"]].map(([id, nimi]) =>
                <button key={id} className={"segb" + (sarjaNakyma === id ? " on" : "")} onClick={() => setSarjaNakyma(id)}>{nimi}</button>)}
            </div>
          </div>
          {!standings ? <div className="tiny" style={{ marginTop: 10 }}>Ladataan…</div> : (
            <div>
              {sarjaNakyma === "div" && <Divisioonat standings={standings} />}
              {sarjaNakyma === "conf" && <Konferenssit standings={standings} />}
              {sarjaNakyma === "porssi" && leaders && goalies && <Porssit leaders={leaders} goalies={goalies} />}
            </div>
          )}
        </div>
      )}

      {tab === "veikkaus" && (standings && rosters ? <Veikkaus standings={standings} rosters={rosters} round={round} lukittu={!!config.locked1} /> : <div className="card tiny">Ladataan…</div>)}
      {tab === "saannot" && (
        <div className="card">
          <h2>Säännöt</h2>
          <div className="osio" style={{ borderTop: "none", paddingTop: 0 }}><div className="ots">Kausiveikkaus</div>
            <div className="kuv">Täytetään ennen kauden alkua (lukitus ennen avauskierrosta). 16 playoff-joukkuetta: 2 p/oikea. Divisioonavoittajat: 3 p/oikea. Presidents' Trophy: 5 p. Pistepörssin voittaja: 10 p oikein, 5 p jos top 3. Paras suomalainen pistemies: 8 p oikein, 4 p jos top 3.</div></div>
          <div className="osio"><div className="ots">Kuukausipisteet</div>
            <div className="kuv">Jokaisen kuukauden viimeisenä päivänä (loka–maaliskuu): +1 p jokaisesta omasta playoff-veikkauksesta, joka on sillä hetkellä playoff-paikalla (top 3 divisioonassa tai wild card 1–2). Kertyneet pisteet jäävät voimaan, vaikka joukkue putoaisi myöhemmin.</div></div>
          <div className="osio"><div className="ots">Vakiokierrokset (1X2)</div>
            <div className="kuv">Kausi jaetaan kahteen puolikkaaseen (loka–joulu ja tammi–huhti), jotka veikataan erikseen ennen puolikkaan alkua. Noin yksi kohde per pelipäivä, lauantaisin kaksi. Merkit: 1 = kotivoitto varsinaisella peliajalla, X = ottelu ratkeaa jatkoajalla tai voittolaukauksilla, 2 = vierasvoitto varsinaisella peliajalla. 3 p / oikea merkki. Lauantain aikaisemmin alkava peli on viikon TULOSKOHDE: siihen veikataan lopputulos (jatkoaika ja voittolaukaukset mukaan lukien, NHL:n virallisen tuloksen mukaan) — täysosuma 4 p, oikea voittaja + toisen joukkueen maalimäärä 3 p, oikea voittaja 2 p. Järjestäjä voi lisäksi merkitä erikoistapahtumia (esim. Winter Classic) tuplakohteiksi (×2).</div></div>
          <div className="osio"><div className="ots">Oma mestari &amp; oma pelaaja</div>
            <div className="kuv">Mestari: 1 p / voitto runkosarjassa, 2 p / voitto playoffeissa. Pelaaja on pakko valita omasta mestarijoukkueesta: hyökkääjä 0,5 p/maali · puolustaja 2 p/maali · maalivahti 6 p/nollapeli. Vain maalit ja nollapelit lasketaan, ei syöttöjä. Pisteet seuraavat pelaajaa koko kauden, vaikka hän vaihtaisi seuraa — vaihto-oikeutta ei ole edes loukkaantumisissa.</div></div>
          <div className="osio"><div className="ots">Playoff-bracket</div>
            <div className="kuv">Kun 16 playoff-joukkuetta on selvillä huhtikuussa, veikataan pudotuspelikaavio kierros kierrokselta. Pisteytys tarkentuu ennen playoffseja.</div></div>
          <div className="osio"><div className="ots">Potti ja lukitukset</div>
            <div className="kuv">Kaikki pisteet lasketaan yhteen — yksi kärkitaulu, yksi palkintojenjako kauden lopussa: 1. sija 60 %, 2. sija 30 %, 3. sija 10 % potista. Tasatilanteessa sijojen palkinnot jaetaan tasan. Kolme lukitusta: kausiveikkaus + 1. puolikas (lokakuu), 2. puolikas (vuodenvaihde), playoff-bracket (huhtikuu). Ennen lukitusta muiden veikkaukset eivät näy kenellekään. Tulokset ja pisteet päivittyvät automaattisesti joka aamu.</div></div>
        </div>
      )}
      {tab === "org" && <Tulossa nimi="Järjestäjä" />}

      <footer>NHL-Veikkaus '26–27 · KOEVERSIO · data: NHL API {meta ? "· haettu " + meta.haettu.slice(0, 10) + " (testipäivä " + meta.paiva + ")" : ""}</footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
