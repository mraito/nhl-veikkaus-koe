<html lang="fi">
<head>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;1,700;1,800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@500;600;700&display=swap');
:root{
  --bg:#070a12; --panel:#0b101d; --panel2:#0d1424; --line:#1c2438; --line2:#151d30;
  --chipbg:#10192e; --ink:#ffffff; --body:#b9c2d4; --mut:#7b8496; --faint:#3d4457;
  --blue:#3f8cff; --blue2:#8fb8f2; --amb:#ffcf3f; --grn:#39e57c; --red:#ff5d52;
  --hopea:#c8ccd6; --pronssi:#d78d4e; --alive:#10192e;
}
*{box-sizing:border-box}
html,body{overflow-x:hidden}
body{margin:0;font-family:'Hanken Grotesk',sans-serif;color:var(--body);background:var(--bg);min-height:100vh;line-height:1.45}
.mono{font-family:'Spline Sans Mono',monospace}
h1,h2,.disp{font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.02em;text-transform:uppercase;color:var(--ink)}
.wrap{max-width:1040px;margin:0 auto;padding:0 16px 90px}
.hero{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin:14px 0 6px;position:relative;overflow:hidden;padding:0}
.hero .streak{position:absolute;top:-20px;bottom:-20px;right:40px;width:280px;background:linear-gradient(115deg,transparent 0,rgba(63,140,255,.18) 35%,rgba(63,140,255,.04) 100%);transform:skewX(-14deg);pointer-events:none}
.herorow{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:20px 24px 16px;position:relative}
.hero .cup{height:100px;width:auto;flex:0 0 auto;filter:drop-shadow(0 3px 10px rgba(0,0,0,.65))}
.hero .htxt{flex:1 1 240px;min-width:0}
.kick{color:var(--blue);font-family:'Barlow Condensed';font-weight:800;letter-spacing:.22em;font-size:11px;text-transform:uppercase}
.title{font-family:'Barlow Condensed';font-weight:800;font-style:italic;font-size:clamp(34px,6.5vw,56px);line-height:.92;margin:4px 0 2px;color:#fff;text-transform:uppercase}
.title .vuosi{color:var(--blue)}
.logostrip{display:flex;gap:14px;align-items:center;margin-top:12px;flex-wrap:wrap}
.logostrip img{width:40px;height:40px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}
.ticker{background:var(--panel2);border-top:1px solid var(--line);padding:7px 24px;font-family:'Spline Sans Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--blue2);text-transform:uppercase}
.tabs{display:flex;gap:2px;flex-wrap:wrap;position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg),rgba(7,10,18,.88));backdrop-filter:blur(8px);padding:10px 0 0;margin-bottom:12px;border-bottom:1px solid var(--line)}
.tab{font-family:'Barlow Condensed';font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.05em;padding:7px 15px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--mut);cursor:pointer;transition:.15s}
.tab:hover{color:#fff}
.tab.on{color:#fff;border-bottom-color:var(--blue)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--panel2);flex-wrap:wrap}
.segb{font-family:'Barlow Condensed';font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:5px 13px;color:var(--mut);border:none;background:transparent;cursor:pointer}
.segb:hover{color:#fff}
.segb.on{background:var(--blue);color:#06080f}
.card{background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:14px;margin:14px 0}
.card h2{font-size:21px;margin:0 0 10px}
.sect{display:flex;align-items:center;gap:12px;margin:2px 0 10px}
.sect .so{font-family:'Barlow Condensed';font-weight:800;font-size:21px;text-transform:uppercase;color:#fff}
.sect .viiva{flex:1;height:2px;background:linear-gradient(90deg,var(--blue),transparent)}
.sect .meta{font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--mut);text-transform:uppercase}
.sect .meta.kulta{color:var(--amb)}
.paneeliots{font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue2);margin:0 0 8px}
.lab{color:var(--mut);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.tiny{font-size:12px;color:var(--mut)}
.note{font-size:14px;color:var(--mut);background:rgba(63,140,255,.05);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:10px 0}
.pill{font-family:'Spline Sans Mono',monospace;font-size:10px;font-weight:600;padding:2.5px 7px;border-radius:4px}
.pill.g{background:rgba(57,229,124,.13);color:var(--grn)}
.pill.s{background:var(--chipbg);color:var(--body)}
.pill.y{background:rgba(255,207,63,.1);color:var(--amb)}
.fintag{font-size:7.5px;background:var(--blue);color:#06080f;border-radius:2px;padding:1px 3px;font-weight:700;margin-right:3px;vertical-align:1px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--mut);font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 6px;border-bottom:1px solid var(--line);font-family:'Spline Sans Mono',monospace}
td{padding:6px 6px;border-bottom:1px solid var(--line2)}
td.num,th.num{text-align:right;font-family:'Spline Sans Mono',monospace;font-size:13px}
.divh{font-family:'Barlow Condensed';font-weight:800;font-size:16px;color:var(--blue2);letter-spacing:.05em;text-transform:uppercase;margin:16px 0 4px}
.joukkue{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ink)}
.joukkue img{width:24px;height:24px}
tr.poline td{border-bottom:2px dashed rgba(255,207,63,.45)}
tr.poon td:first-child{box-shadow:inset 3px 0 0 var(--blue)}
.rlohko{font-family:'Barlow Condensed';font-weight:800;display:flex;align-items:center;justify-content:center;height:100%;border-radius:8px 0 0 8px;font-size:18px;background:var(--line2);color:var(--mut)}
.rlohko.s1{background:var(--amb);color:#211a02}
.rlohko.s2{background:var(--hopea);color:#15171c}
.rlohko.s3{background:var(--pronssi);color:#221204}
.krivi{display:grid;grid-template-columns:44px 44px 1fr auto 96px;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;margin-bottom:5px;min-height:48px;padding-right:14px;cursor:pointer}
.krivi:hover{background:#111a30}
.krivi.k1{background:linear-gradient(90deg,rgba(255,207,63,.10),var(--panel2) 55%)}
.krivi.k2{background:linear-gradient(90deg,rgba(200,204,214,.09),var(--panel2) 55%)}
.krivi.k3{background:linear-gradient(90deg,rgba(215,141,78,.09),var(--panel2) 55%)}
.knimi{font-family:'Barlow Condensed';font-weight:700;font-size:19px;text-transform:uppercase;color:#fff;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.kotsikot{display:grid;grid-template-columns:44px 34px 1fr 70px 70px 70px 70px 96px;gap:8px;padding-right:14px;font-family:'Spline Sans Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--mut);text-transform:uppercase;margin-bottom:5px}
.kpist{font-family:'Spline Sans Mono',monospace;font-size:12.5px;color:var(--body);text-align:right}
.kyht{font-family:'Barlow Condensed';font-weight:800;font-size:25px;color:#fff;text-align:right}
@media(max-width:879px){
  .kpiilo{display:none}
  .krivi{grid-template-columns:38px 40px 1fr 88px}
  .johtaja{flex-wrap:nowrap;gap:12px;padding:12px 14px}
  .johtaja > div:nth-child(2){flex:1;min-width:0}
  .johtaja .naamio{width:48px!important;height:48px!important}
  .johtaja .naamio>img:first-child,.johtaja .naamio>span:first-child{width:48px!important;height:48px!important}
  .johtaja .naamio img:last-child{width:26px!important;height:26px!important}
  .jnimi{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .johtaja .jala{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .jpisteet{font-size:30px}
  .johtaja .echip{display:none}
  .vgrid2{grid-template-columns:1fr}
  .divgrid{grid-template-columns:1fr}
  .tallennuspalkki .tnappi{width:100%}
  .tallennuspalkki .tedistys{margin-left:0}
  .vrivi{flex-wrap:wrap}
  .vrivi .pari{flex:1 1 100%}
  .vrivi .merkit{margin-left:auto}
  .kirjaudu{flex-wrap:wrap}
  .vpaneeli input[placeholder^="Etunimi"]{flex:1 1 100%;min-width:0}
}
/* ---- kärkitaulun johtajakortti ---- */
.johtaja{display:flex;align-items:center;gap:16px;background:linear-gradient(115deg,rgba(255,207,63,.10),var(--panel2) 55%);border:1px solid rgba(255,207,63,.35);border-radius:12px;padding:16px 18px;margin-bottom:8px;flex-wrap:wrap}
.jnimi{font-family:'Barlow Condensed';font-weight:800;font-size:28px;color:#fff;text-transform:uppercase;line-height:1.05;margin:2px 0}
.jpisteet{font-family:'Barlow Condensed';font-weight:800;font-style:italic;font-size:46px;color:var(--amb);line-height:1;text-align:right}
.echip{font-family:'Spline Sans Mono',monospace;font-size:9.5px;font-weight:600;color:var(--mut);background:var(--chipbg);border-radius:4px;padding:4px 8px;white-space:nowrap}
/* ---- avattu erittely kortteina ---- */
.ekortit{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;padding:4px 10px 12px 10px}
.ekortti{background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:10px 12px}
.el{font-family:'Spline Sans Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.12em;color:var(--mut);text-transform:uppercase;margin-bottom:6px}
.ei{font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#fff}
.ea{font-family:'Spline Sans Mono',monospace;font-size:9.5px;color:var(--mut);margin-top:3px}
/* ---- pörssien kärkinosto ---- */
.feat{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:linear-gradient(115deg,var(--panel2),#12203a);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-bottom:5px}
.fnimi{font-family:'Barlow Condensed';font-weight:800;font-size:19px;color:#fff;text-transform:uppercase;line-height:1.05}
.farvo{font-family:'Barlow Condensed';font-weight:800;font-style:italic;font-size:32px;color:var(--blue);line-height:1;text-align:right}
/* ---- sarjataulukon rivit ---- */
.srivi{display:grid;grid-template-columns:26px 1fr 56px 52px 36px;gap:7px;align-items:center;background:var(--panel2);border:1px solid var(--line2);border-radius:7px;margin-bottom:4px;padding-right:9px;overflow:hidden;min-height:32px}
.slohko{display:flex;align-items:center;justify-content:center;height:32px;background:var(--line2);color:var(--mut);font-family:'Barlow Condensed';font-weight:800;font-size:14px;border-radius:7px 0 0 7px}
.slohko.po{background:var(--blue);color:#06080f}
.snimi{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:.02em;color:#fff;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.snimi img{width:19px;height:19px;flex:0 0 auto}
.smono{text-align:right;font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--mut)}
.spist{text-align:right;font-family:'Barlow Condensed';font-weight:800;font-size:17px;color:#fff}
.raja{display:flex;align-items:center;gap:8px;margin:5px 0;font-family:'Spline Sans Mono',monospace;font-size:8px;font-weight:600;letter-spacing:.14em;color:var(--amb)}
.raja::before,.raja::after{content:"";flex:1;border-top:1px dashed rgba(255,207,63,.45)}
/* ---- näytä lisää ---- */
.haivytys{position:absolute;left:0;right:0;bottom:0;height:42px;background:linear-gradient(transparent,var(--panel));pointer-events:none}
.laajenna{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;padding:7px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);color:var(--blue2);font-family:'Spline Sans Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:.12em;cursor:pointer;text-transform:uppercase}
.laajenna:hover{border-color:var(--blue);color:#fff}
.laajenna.auki{color:var(--mut)}
.vpaiva{color:var(--blue2);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:14px 0 4px;font-family:'Barlow Condensed'}
.gblokki{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;margin-bottom:7px}
.gblokki.kohde{border-color:#2a3a5c}
.tagi{font-family:'Spline Sans Mono',monospace;font-size:9px;font-weight:600;color:var(--hopea);border:1px solid var(--line);border-radius:4px;padding:1px 6px;letter-spacing:.04em}
.tulospilli{font-family:'Spline Sans Mono',monospace;font-size:8.5px;font-weight:600;color:var(--amb);background:rgba(255,207,63,.1);border-radius:4px;padding:2px 7px;letter-spacing:.1em;margin-left:auto}
.pelaaja{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--chipbg);font-size:14px}
.pelaaja:last-child{border-bottom:none}
.pelaaja .sija{font-family:'Barlow Condensed';font-weight:800;color:var(--mut);width:22px;font-size:14px}
.pelaaja img.kasvo{width:28px;height:28px;border-radius:50%;background:var(--chipbg);object-fit:cover;border:1px solid var(--line2)}
.pelaaja img.logo{width:24px;height:24px}
.pelaaja b{font-family:'Barlow Condensed';font-weight:700;font-size:15.5px;text-transform:uppercase;color:#fff;letter-spacing:.02em}
.pelaaja .arvo{margin-left:auto;font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:16px;color:var(--ink)}
.ppilli{margin-left:auto;font-family:'Spline Sans Mono',monospace;font-size:10.5px;font-weight:600;color:var(--blue2);background:var(--chipbg);border-radius:4px;padding:2px 7px;white-space:nowrap}
.valinnutrivi{font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:var(--faint);margin-top:3px}
.gridx{display:grid;gap:14px}
@media(min-width:880px){.gridx.two{grid-template-columns:1fr 1fr}}
.tulossa{text-align:center;padding:40px 20px;color:var(--mut)}
.tulossa .iso{font-family:'Barlow Condensed';font-weight:800;font-size:26px;color:var(--blue2);margin-bottom:8px;text-transform:uppercase}
footer{color:var(--faint);font-size:10px;font-family:'Spline Sans Mono',monospace;text-align:center;padding:20px 0;text-transform:uppercase;letter-spacing:.06em}
.kirjaudu{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.kentta{display:flex;flex-direction:column;gap:4px}
input,select{font-family:inherit;font-size:15px;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;outline:none;max-width:100%;box-sizing:border-box}
input:focus,select:focus{border-color:var(--blue)}
button.act{font-family:inherit;font-weight:800;background:var(--blue);color:#06080f;border:none;border-radius:11px;padding:11px 18px;cursor:pointer;font-size:15px}
button.act:hover{filter:brightness(1.08)}
button.act:disabled{opacity:.5;cursor:not-allowed}
button.ghost{font-family:inherit;background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:9px 15px;cursor:pointer;font-weight:700}
button.ghost:hover{border-color:var(--blue)}
.haku{position:relative}
.hakulista{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--panel);border:1px solid var(--line);border-radius:10px;z-index:30;max-height:260px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.hakurivi{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;font-size:14px}
.hakurivi:hover{background:var(--chipbg)}
.hakurivi img{width:26px;height:26px;border-radius:50%;background:var(--chipbg)}
.valittu{display:flex;align-items:center;gap:8px;background:var(--chipbg);border-radius:10px;padding:7px 10px;margin-top:6px;color:var(--ink)}
.valittu img{width:30px;height:30px;border-radius:50%;background:var(--panel2)}
.valittu .tyhjaa{margin-left:auto;color:var(--red);cursor:pointer;font-weight:800;background:none;border:none;font-size:15px}
.osio{margin:18px 0 6px;padding-top:14px;border-top:1px solid var(--line)}
.osio .ots{font-family:'Barlow Condensed';font-weight:800;font-size:16px;color:var(--blue2);letter-spacing:.04em;text-transform:uppercase}
.osio .kuv{font-size:13px;color:var(--mut);margin:2px 0 8px}
.puuttuu{color:var(--amb);font-size:13px}
.okvihrea{color:var(--grn);font-size:13px;font-weight:700}
.vrivi{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 12px;border:1px solid var(--line2);border-radius:9px;margin:0 0 5px;background:var(--panel2)}
.vrivi.tuloskohde{border-color:#2a3a5c}
.vrivi .aika{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--mut);min-width:38px}
.vrivi .pari{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;min-width:150px;color:var(--ink)}
.vrivi .pari img{width:22px;height:22px}
.vrivi .at{font-family:'Spline Sans Mono',monospace;color:var(--faint);font-weight:400}
.merkit{display:flex;gap:5px;margin-left:auto}
.merkki{font-family:'Barlow Condensed';font-weight:800;font-size:17px;width:44px;height:40px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--body);cursor:pointer}
.merkki:hover{border-color:var(--blue)}
.merkki.val{background:var(--blue);color:#06080f;border-color:var(--blue)}
.merkki:disabled{cursor:default;opacity:.85}
.tulosinput{width:40px;height:40px;text-align:center;font-family:'Spline Sans Mono',monospace;font-size:15px;font-weight:600;border-radius:8px;padding:4px}
.selite{font-family:'Spline Sans Mono',monospace;font-size:9px;color:var(--faint);letter-spacing:.06em;margin-top:10px}
/* ---- Veikkaus-sivun uudistus (handoff 3) ---- */
html{scroll-behavior:smooth}
.vgrid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
.vpaneeli{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:14px 16px}
.vpotsikko{font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:.08em;color:var(--blue2);text-transform:uppercase}
.vpkuvaus{font-size:11px;color:var(--mut);margin:3px 0 10px}
.vinput{background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:#fff;padding:9px 12px}
.vinput.mono{font-family:'Spline Sans Mono',monospace}
.vnappi{background:var(--blue);color:#06080f;font-family:'Barlow Condensed';font-weight:800;font-size:14px;text-transform:uppercase;letter-spacing:.06em;border:none;border-radius:7px;padding:9px 18px;cursor:pointer}
.vnappi:hover{background:#5a9dff}
.nimichip{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed';font-weight:700;font-size:14px;text-transform:uppercase;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px 13px;color:#fff;cursor:pointer}
.nimichip:hover{border-color:var(--blue)}
.nimichip .lukko{color:var(--mut);font-size:11px}
.stepper{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0 4px}
.schip{font-family:'Spline Sans Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.08em;border-radius:5px;padding:4px 9px;background:var(--panel2);color:var(--mut);border:1px solid var(--line2);text-decoration:none}
.schip.done{background:rgba(57,229,124,.12);color:var(--grn);border-color:rgba(57,229,124,.3)}
.vpan{background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:16px;margin:12px 0;scroll-margin-top:64px}
.vpan .ots{font-family:'Barlow Condensed';font-weight:800;font-size:17px;color:var(--blue2);letter-spacing:.04em;text-transform:uppercase}
.pinfo{font-family:'Spline Sans Mono',monospace;font-size:9.5px;font-weight:600;color:var(--mut);letter-spacing:.06em;margin-left:8px}

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
firebase.initializeApp(window.FIREBASE_CONFIG);
const db = firebase.firestore();

const onPOpaikalla = t => t.divisionSequence <= 3 || (t.wildcardSequence >= 1 && t.wildcardSequence <= 2);

// ===== PISTELASKENTA =====
function tulosPisteet(v, oikea) {
  if (!v || v.v == null || v.k == null || !oikea) return 0;
  const vVoitto = v.v > v.k, oVoitto = oikea.v > oikea.k;
  if (vVoitto !== oVoitto) return 0;
  if (v.v === oikea.v && v.k === oikea.k) return 4;
  if (v.v === oikea.v || v.k === oikea.k) return 3;
  return 2;
}
function nykyinenPelaaja(p) { return p.player2 || p.player; }
function pelaajaKerroin(pl) { return pl.pos === "MV" ? 6 : (pl.pos === "P" ? 2 : 0.5); }
function pelaajaStat(pl, playerstats) {
  const id = String(pl.id);
  return pl.pos === "MV" ? (playerstats.nollapelit[id] || 0) : (playerstats.maalit[id] || 0);
}
function pelaajaPisteet(p, playerstats) {
  if (!p.player || !playerstats) return 0;
  if (p.player2 && p.snap) {
    return pelaajaKerroin(p.player) * (p.snap.p1 || 0)
      + pelaajaKerroin(p.player2) * Math.max(0, pelaajaStat(p.player2, playerstats) - (p.snap.p2 || 0));
  }
  return pelaajaKerroin(p.player) * pelaajaStat(p.player, playerstats);
}
function laskePisteet(p, round, results, checkpoints, playerstats, winsMap, erikois) {
  const erittely = { vakio: 0, vakioOikein: 0, vakioPelattu: 0, kk: 0, kkPerPvm: {}, mestari: 0, pelaaja: 0 };
  if (round && results) {
    round.kohteet.forEach(g => {
      const oikea = results.tulokset[g.id];
      if (!oikea) return;
      erittely.vakioPelattu++;
      if (g.tulos) {
        const pts = tulosPisteet((p.tulos || {})[g.id], oikea);
        if (pts > 0) erittely.vakioOikein++;
        erittely.vakio += pts * (g.dbl ? 2 : 1);
      } else {
        const oikeaMerkki = oikea.paattyi !== "REG" ? "X" : (oikea.k > oikea.v ? "1" : "2");
        if ((p.vakio || {})[g.id] === oikeaMerkki) { erittely.vakioOikein++; erittely.vakio += 3 * (g.dbl ? 2 : 1); }
      }
    });
  }
  if (checkpoints) {
    const omat = (p.poE || []).concat(p.poW || []);
    Object.keys(checkpoints).sort().forEach(pv => {
      const n = omat.filter(t => checkpoints[pv][t]).length;
      erittely.kkPerPvm[pv] = n; erittely.kk += n;
    });
  }
  if (p.champ && winsMap[p.champ] != null) erittely.mestari = winsMap[p.champ];
  erittely.pelaaja = pelaajaPisteet(p, playerstats);
  erittely.erikois = 0;
  if (erikois) {
    if (erikois.allstar && p.allstar === erikois.allstar) erittely.erikois += 8;
    if (erikois.viimeinen && p.viimeinen === erikois.viimeinen) erittely.erikois += 5;
  }
  erittely.yhteensa = erittely.vakio + erittely.kk + erittely.mestari + erittely.pelaaja + erittely.erikois;
  return erittely;
}
function splitPot(potti) {
  const osuudet = [0.6, 0.3, 0.1].map(o => Math.floor(potti * o));
  osuudet[0] += potti - osuudet.reduce((a, b) => a + b, 0);  // jäännös 1. sijalle
  return osuudet;
}
const fmtP = (n) => (Math.round(n * 10) / 10).toLocaleString("fi-FI");
const lyhytNimi = (nimi) => {
  const osat = (nimi || "").split(" ");
  return osat.length > 1 ? osat[0][0] + ". " + osat.slice(1).join(" ") : nimi;
};

function FaceLogo({ kuva, logo, koko, logoKoko, reuna, className }) {
  return (
    <span className={className} style={{ position: "relative", display: "inline-flex", width: koko, height: koko, flex: "0 0 auto" }}>
      {kuva ? <img src={kuva} alt="" style={{ width: koko, height: koko, borderRadius: "50%", objectFit: "cover",
        background: "var(--chipbg)", border: reuna || "1px solid var(--line2)" }} />
        : <span style={{ width: koko, height: koko, borderRadius: "50%", background: "var(--chipbg)", border: "1px solid var(--line2)" }}></span>}
      {logo && <img src={logo} alt="" style={{ position: "absolute", right: -8, bottom: -5,
        width: logoKoko, height: logoKoko, filter: "drop-shadow(0 1px 3px rgba(0,0,0,.7))" }} />}
    </span>
  );
}

function Laajenna({ auki, onClick, kiinniTxt, aukiTxt }) {
  return (
    <div className={"laajenna" + (auki ? " auki" : "")} onClick={onClick}>
      {auki ? (aukiTxt || "NÄYTÄ VÄHEMMÄN") + " ▴" : kiinniTxt + " ▾"}
    </div>
  );
}


const VKL = ["su", "ma", "ti", "ke", "to", "pe", "la"];
const pvmTxt = (pvm) => VKL[new Date(pvm).getUTCDay()] + " " + pvm.slice(8, 10) + "." + pvm.slice(5, 7) + ".";

function Uutiskortti({ preds, config, dayscores, rosters }) {
  const [fiAuki, setFiAuki] = useState(false);
  const [kaikkiAuki, setKaikkiAuki] = useState(false);
  const tanaan = new Date().toISOString().slice(0, 10);
  const lyhytPvm = (pvm) => parseInt(pvm.slice(8, 10), 10) + "." + parseInt(pvm.slice(5, 7), 10) + ".";

  // 1) Suomalaisten pisteet viimeisimmältä pelipäivältä
  let fiPvm = "", fiPisteet = [];
  if (dayscores && rosters) {
    const finnit = new Set(Object.values(rosters).flatMap(t =>
      t.pelaajat.filter(p => p.maa === "FIN").map(p => String(p.id))));
    const kuvat = {};
    Object.values(rosters).forEach(t => t.pelaajat.forEach(p => { kuvat[String(p.id)] = p.kuva; }));
    const paivat = {};
    Object.values(dayscores).flat().forEach(g => {
      const pvm = suomiAika(g.alkaaUTC).pvm;
      (paivat[pvm] = paivat[pvm] || []).push(g);
    });
    fiPvm = Object.keys(paivat).sort().reverse()[0] || "";
    if (fiPvm) {
      const koonti = {};
      paivat[fiPvm].forEach(g => { if (g.pts) Object.keys(g.pts).forEach(id => {
        if (!finnit.has(id)) return;
        const p = g.pts[id];
        const k = koonti[id] || { id, n: p.n, g: 0, a: 0 };
        k.g += p.g; k.a += p.a; koonti[id] = k;
      }); });
      fiPisteet = Object.values(koonti).map(k => Object.assign(k, { yht: k.g + k.a, kuva: kuvat[k.id] }))
        .sort((a, b) => b.yht - a.yht || b.g - a.g);
    }
  }

  // 2) Pelaajanvaihdot (näkyvät 7 pv vaihdosta)
  const vaihtoRaja = new Date(Date.now() - 7 * 864e5).toISOString().slice(0, 10);
  const vaihdot = preds.filter(p => p.player2 && p.vaihtoPvm && p.vaihtoPvm >= vaihtoRaja);

  // 3) Trade deadline lähestyy (viimeiset 14 pv)
  let dlPaivia = null;
  if (config && config.tradeDL) {
    const d = Math.round((new Date(config.tradeDL) - new Date(tanaan)) / 864e5);
    if (d >= 0 && d <= 14) dlPaivia = d;
  }

  // 4) Järjestäjän tiedote (voimassaolopäivään asti)
  const tiedote = (config && config.tiedote && String(config.tiedote).trim() &&
    (!config.tiedoteAsti || tanaan <= config.tiedoteAsti)) ? String(config.tiedote).trim() : "";

  const rivit = [];
  if (fiPvm) {
    const nayta = fiAuki ? fiPisteet : fiPisteet.slice(0, 5);
    rivit.push(
      <div className="urivi" key="fi">
        <span className="utagi si">SUOMALAISET</span>
        <span className="mono" style={{ fontSize: 9, color: "var(--faint)" }}>{pvmTxt(fiPvm)}</span>
        {fiPisteet.length === 0 && <span style={{ color: "var(--mut)" }}>Ei suomalaispisteitä tällä kierroksella.</span>}
        {nayta.map(f =>
          <span className="fchip" key={f.id}>
            {f.kuva && <img src={f.kuva} alt="" />}
            <span className="fn">{lyhytNimi(f.n)}</span>
            <span className={"fp" + (f.yht >= 3 ? " iso" : "")}>{f.g}+{f.a}</span>
          </span>)}
        {fiPisteet.length > 5 &&
          <button className="fplus" onClick={() => setFiAuki(!fiAuki)}>
            {fiAuki ? "− vähemmän ▴" : "+" + (fiPisteet.length - 5) + " ▾"}</button>}
      </div>);
  }
  vaihdot.forEach(p => rivit.push(
    <div className="urivi" key={"v-" + p.name}>
      <span className="utagi ho">VAIHTO</span>
      <span><span className="unimi">{p.name}</span> vaihtoi: <span style={{ color: "var(--body)" }}>{lyhytNimi(p.player.nimi)}</span>
        <span style={{ color: "var(--mut)" }}> → </span><span style={{ color: "#fff" }}>{lyhytNimi(p.player2.nimi)}</span></span>
      <span className="upvm">{lyhytPvm(p.vaihtoPvm)}</span>
    </div>));
  if (dlPaivia != null) rivit.push(
    <div className="urivi" key="dl">
      <span className="utagi am">DEADLINE</span>
      <span>Pelaajanvaihdon takaraja <span style={{ color: "#fff" }}>{lyhytPvm(config.tradeDL)}</span>
        <span style={{ color: "var(--amb)" }}> — {dlPaivia === 0 ? "viimeinen päivä tänään" : dlPaivia + (dlPaivia === 1 ? " päivä" : " päivää") + " jäljellä"}</span></span>
    </div>);
  if (tiedote) rivit.push(
    <div className="urivi" key="tied">
      <span className="utagi am">TIEDOTE</span>
      <span>{tiedote} <span className="mono" style={{ fontSize: 9, color: "var(--faint)" }}>— JÄRJESTÄJÄ</span></span>
    </div>);

  if (rivit.length === 0) return null;
  const naytaRivit = kaikkiAuki ? rivit : rivit.slice(0, 4);
  return (
    <div className="uutiskortti">
      <div className="uotsake"><span className="upiste"></span><span className="ul">UUTISET</span>
        <span className="ur">PÄIVITTYY JOKA AAMU</span></div>
      {naytaRivit}
      {rivit.length > 4 &&
        <Laajenna auki={kaikkiAuki} onClick={() => setKaikkiAuki(!kaikkiAuki)}
                  kiinniTxt={"NÄYTÄ KAIKKI (" + rivit.length + ")"} />}
    </div>
  );
}

function Tulostaulukko({ preds, round, results, checkpoints, playerstats, standings, stake, config }) {
  const erikois = { allstar: config && config.allstarTulos, viimeinen: config && config.viimeinenTulos };
  const [auki, setAuki] = useState(null);
  const winsMap = {}, logot = {}, nimetMap = {};
  standings.forEach(t => { winsMap[t.teamAbbrev.default] = t.wins; logot[t.teamAbbrev.default] = t.teamLogo; nimetMap[t.teamAbbrev.default] = t.teamName.default; });
  const rivit = preds.map(p => ({ p, e: laskePisteet(p, round, results, checkpoints, playerstats, winsMap, erikois) }))
    .sort((a, b) => b.e.yhteensa - a.e.yhteensa);
  const potti = preds.length * stake;
  const palkinnot = splitPot(potti);
  if (preds.length === 0) return (
    <div className="card"><h2>Kärkitaulu</h2>
      <div className="note">Ei vielä osallistujia — käy tekemässä veikkaus Veikkaus-välilehdellä!</div></div>);

  const Erittely = ({ p, e }) => (
    <div className="ekortit">
      <div className="ekortti"><div className="el">Vakiokohteet</div>
        <div className="ei">{fmtP(e.vakio)} <span style={{ fontSize: 13 }}>p</span></div>
        <div className="ea">{e.vakioOikein}/{e.vakioPelattu} oikein</div></div>
      <div className="ekortti"><div className="el">Kuukausipisteet</div>
        <div className="ei">{e.kk} <span style={{ fontSize: 13 }}>p</span></div>
        <div className="ea">{Object.keys(e.kkPerPvm).sort().map(pv => pv.slice(8,10) + "." + pv.slice(5,7) + ". +" + e.kkPerPvm[pv]).join(" · ")}</div></div>
      <div className="ekortti"><div className="el">Oma mestari</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {p.champ && <img src={logot[p.champ]} alt="" style={{ width: 30, height: 30 }} />}
          <span style={{ fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 14, textTransform: "uppercase", color: "#fff" }}>{p.champ ? nimetMap[p.champ] : "—"}</span></div>
        <div className="ea" style={{ color: "var(--blue2)" }}>{e.mestari} voittoa · {e.mestari} p</div></div>
      <div className="ekortti"><div className="el">Erikoiskohteet</div>
        <div className="ea" style={{ marginTop: 0 }}>All-Star: {p.allstar || "—"} {erikois.allstar ? (p.allstar === erikois.allstar ? "· +8 p" : "· 0 p") : "· ratkeaa 6.2.2027"}</div>
        <div className="ea">Viimeinen: {p.viimeinen || "—"} {erikois.viimeinen ? (p.viimeinen === erikois.viimeinen ? "· +5 p" : "· 0 p") : "· ratkeaa huhtikuussa"}</div>
        {e.erikois > 0 && <div className="ei" style={{ fontSize: 16, marginTop: 3 }}>+{e.erikois} p</div>}</div>
      <div className="ekortti"><div className="el">Oma pelaaja{p.player2 ? " (vaihdettu)" : ""}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {nykyinenPelaaja(p) && <img src={nykyinenPelaaja(p).kuva} alt="" style={{ width: 30, height: 30, borderRadius: "50%", background: "var(--chipbg)" }} />}
          <span style={{ fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 14, textTransform: "uppercase", color: "#fff" }}>{nykyinenPelaaja(p) ? nykyinenPelaaja(p).nimi : "—"}</span></div>
        <div className="ea" style={{ color: "var(--blue2)" }}>{p.player2 ? lyhytNimi(p.player.nimi) + " → " + lyhytNimi(p.player2.nimi) + " (" + p.vaihtoPvm + ") · " : ""}{nykyinenPelaaja(p) ? fmtP(e.pelaaja) + " p" : "—"}</div></div>
    </div>
  );

  const eka = rivit[0];
  return (
    <div className="card">
      <div className="sect">
        <span className="so">Kärkitaulu</span><span className="viiva"></span>
        <span className="meta kulta">Potti {potti} € · jako {palkinnot.join(" / ")} €</span>
      </div>

      <div className="johtaja" onClick={() => setAuki(auki === eka.p.name ? null : eka.p.name)} style={{ cursor: "pointer" }}>
        <FaceLogo className="naamio" kuva={nykyinenPelaaja(eka.p) && nykyinenPelaaja(eka.p).kuva} logo={eka.p.champ && logot[eka.p.champ]}
                  koko={64} logoKoko={34} reuna="2px solid var(--amb)" />
        <div>
          <div className="mono" style={{ fontSize: 9, letterSpacing: ".16em", color: "var(--amb)", textTransform: "uppercase" }}>Johdossa</div>
          <div className="jnimi">{eka.p.name}</div>
          <div className="mono jala" style={{ fontSize: 10, color: "var(--mut)", marginTop: 3 }}>
            {eka.p.champ ? nimetMap[eka.p.champ] : "—"}{nykyinenPelaaja(eka.p) ? " · " + lyhytNimi(nykyinenPelaaja(eka.p).nimi) : ""} · {eka.e.vakioOikein}/{eka.e.vakioPelattu} vakio-osumaa</div>
        </div>
        <div style={{ display: "flex", gap: 6, marginLeft: "auto", flexWrap: "wrap" }}>
          <span className="echip">V {fmtP(eka.e.vakio)}</span><span className="echip">KK {eka.e.kk}</span>
          <span className="echip">M {eka.e.mestari}</span><span className="echip">P {fmtP(eka.e.pelaaja)}</span>
        </div>
        <div>
          <div className="jpisteet">{fmtP(eka.e.yhteensa)}</div>
          <div className="mono" style={{ fontSize: 9.5, color: "var(--mut)", textAlign: "right", textTransform: "uppercase" }}>pistettä</div>
        </div>
      </div>
      {auki === eka.p.name && <Erittely p={eka.p} e={eka.e} />}

      {rivit.slice(1).map(({ p, e }, j) => {
        const i = j + 1;
        return (
          <div key={p.name}>
            <div className={"krivi" + (i < 3 ? " k" + (i + 1) : "")} onClick={() => setAuki(auki === p.name ? null : p.name)}>
              <div className={"rlohko" + (i < 3 ? " s" + (i + 1) : "")}>{i + 1}</div>
              <div style={{ display: "flex", justifyContent: "center" }}>
                <FaceLogo kuva={nykyinenPelaaja(p) && nykyinenPelaaja(p).kuva} logo={p.champ && logot[p.champ]} koko={34} logoKoko={22} /></div>
              <div>
                <div className="knimi" style={{ fontSize: 19 }}>{p.name}
                  <span style={{ color: "var(--mut)" }}>{auki === p.name ? "▾" : "›"}</span></div>
                <div className="mono" style={{ fontSize: 10, color: "var(--mut)" }}>
                  {p.champ ? nimetMap[p.champ] : "—"}{nykyinenPelaaja(p) ? " · " + lyhytNimi(nykyinenPelaaja(p).nimi) : ""}</div>
              </div>
              <div className="mono kpiilo" style={{ fontSize: 9.5, color: "var(--mut)" }}>
                V {fmtP(e.vakio)} · KK {e.kk} · M {e.mestari} · P {fmtP(e.pelaaja)}</div>
              <div className="kyht" style={{ fontSize: 23 }}>{fmtP(e.yhteensa)}</div>
            </div>
            {auki === p.name && <Erittely p={p} e={e} />}
          </div>
        );
      })}
      <div className="mono" style={{ fontSize: 9.5, color: "var(--faint)", textTransform: "uppercase", letterSpacing: ".06em", marginTop: 6 }}>
        Pisteissä mukana: vakiokohteet · kuukausipisteet · oma mestari · oma pelaaja — kausiveikkaus ratkeaa runkosarjan päättyessä</div>
    </div>
  );
}

const suomiAika = (utc) => {
  const kesa = utc < "2025-10-26T01:00:00Z" || (utc >= "2026-03-29T01:00:00Z" && utc < "2026-10-25T01:00:00Z");
  const fi = new Date(new Date(utc).getTime() + (kesa ? 3 : 2) * 3600 * 1000);
  return { pvm: fi.toISOString().slice(0, 10), klo: fi.toISOString().slice(11, 16) };
};

function Chipit({ rivit }) {
  const [auki, setAuki] = useState(false);
  const nayta = auki ? rivit : rivit.slice(0, 4);
  return (
    <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 7 }}>
      {nayta.map((r, i) =>
        <span key={i} className={"pill " + (r.pts > 0 ? "g" : "s")}>{r.txt}</span>)}
      {rivit.length > 4 &&
        <span className="pill s" style={{ cursor: "pointer", color: "var(--blue2)", letterSpacing: ".12em" }} onClick={() => setAuki(!auki)}>
          {auki ? "VÄHEMMÄN ▴" : "+" + (rivit.length - 4) + " LISÄÄ ▾"}</span>}
    </div>
  );
}

function PisteRivi({ pts, finnit, valitut }) {
  if (!pts) return null;
  const rivit = Object.keys(pts).map(id => {
    const p = pts[id], yht = p.g + p.a;
    return { id, txt: p.n + " " + p.g + "+" + p.a, yht, oma: valitut[id], finn: finnit.has(id) };
  }).filter(r => r.finn || r.oma || r.yht >= 2)
    .sort((a, b) => {
      const kat = (r) => r.finn ? 0 : (r.yht >= 3 ? 1 : 2);
      return kat(a) - kat(b) || b.yht - a.yht;
    }).slice(0, 6);
  if (!rivit.length) return null;
  return (
    <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 5 }}>
      {rivit.map(r =>
        <span key={r.id} className="pill" title={r.oma ? "Valinnut: " + r.oma.join(", ") : ""}
              style={r.oma ? { background: "rgba(57,229,124,.13)", color: "var(--grn)" }
                : r.finn ? { background: "rgba(63,140,255,.12)", color: "var(--blue2)" }
                : r.yht >= 3 ? { background: "var(--chipbg)", color: "var(--amb)" }
                : { background: "var(--chipbg)", color: "var(--mut)" }}>
          {r.oma ? "★ " : ""}{r.finn ? <span className="fintag">FIN</span> : null}{r.txt}</span>)}
    </div>
  );
}

function OtteluRivi({ g, logot, tulos }) {
  const voittaja = tulos ? (g.k > g.v ? g.koti : g.vieras) : null;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "nowrap" }}>
      <span className="tiny mono" style={{ minWidth: 36, fontSize: 10 }}>{suomiAika(g.alkaaUTC).klo}</span>
      <img src={logot[g.vieras]} alt="" style={{ width: 20, height: 20 }} />
      <span style={{ fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 15, color: "var(--ink)" }}>{g.vieras}</span>
      {tulos ? <span className="mono" style={{ fontWeight: 600, fontSize: 13.5 }}>{g.v}–{g.k}</span>
             : <span style={{ color: "var(--mut)" }}>@</span>}
      <span style={{ fontFamily: "'Barlow Condensed'", fontWeight: 700, fontSize: 15, color: "var(--ink)" }}>{g.koti}</span>
      <img src={logot[g.koti]} alt="" style={{ width: 20, height: 20 }} />
      {tulos && g.paattyi !== "REG" && <span className="tagi">{g.paattyi === "OT" ? "JA" : "VL"}</span>}
      {tulos && <span className="pill s">{voittaja}</span>}
    </div>
  );
}

function PaivaLohko({ ottelut, kohdeMap, preds, lukittu, logot, finnit, valitut, mennyt }) {
  const [auki, setAuki] = useState(false);
  const jarjestys = ottelut.slice().sort((a, b) =>
    (kohdeMap[b.id] ? 1 : 0) - (kohdeMap[a.id] ? 1 : 0) || suomiAika(a.alkaaUTC).klo.localeCompare(suomiAika(b.alkaaUTC).klo));
  const nayta = auki ? jarjestys : jarjestys.slice(0, 4);
  const nimijarjestys = preds.slice().sort((a, b) => a.name.localeCompare(b.name, "fi"));
  return (
    <div>
      <div style={{ position: "relative" }}>
      {nayta.map(g => {
        const kohde = kohdeMap[g.id];
        const chipit = kohde && mennyt ? nimijarjestys.map(p => {
          if (kohde.tulos) {
            const v = (p.tulos || {})[g.id];
            const pts = tulosPisteet(v, { v: g.v, k: g.k });
            return { pts, txt: p.name + " " + (v && v.v != null && v.k != null ? v.v + "–" + v.k : "–") + (pts ? " +" + pts : "") };
          }
          const oikea = g.paattyi !== "REG" ? "X" : (g.k > g.v ? "1" : "2");
          const m = (p.vakio || {})[g.id];
          const pts = m === oikea ? 3 * (kohde.dbl ? 2 : 1) : 0;
          return { pts, txt: p.name + " " + (m || "–") + (pts ? " +" + pts : "") };
        }) : null;
        return (
          <div key={g.id} className={"gblokki" + (kohde ? " kohde" : "")}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <OtteluRivi g={g} logot={logot} tulos={mennyt} />
              {kohde && <span className="tulospilli">{kohde.tulos ? "TULOSKOHDE" : "VAKIOKOHDE"}</span>}
            </div>
            {chipit && <Chipit rivit={chipit} />}
            {kohde && !mennyt && !lukittu && <div className="tiny" style={{ marginTop: 5 }}>Veikkaukset näkyvät lukituksen jälkeen.</div>}
            {kohde && !mennyt && lukittu && preds.length > 0 &&
              <Chipit rivit={nimijarjestys.map(p => {
                if (kohde.tulos) { const v = (p.tulos || {})[g.id];
                  return { pts: 0, txt: p.name + " " + (v && v.v != null && v.k != null ? v.v + "–" + v.k : "–") }; }
                return { pts: 0, txt: p.name + " " + ((p.vakio || {})[g.id] || "–") };
              })} />}
            {mennyt && <PisteRivi pts={g.pts} finnit={finnit} valitut={valitut} />}
          </div>
        );
      })}
      {!auki && jarjestys.length > 4 && <div className="haivytys"></div>}
      </div>
      {jarjestys.length > 4 &&
        <Laajenna auki={auki} onClick={() => setAuki(!auki)}
                  kiinniTxt={"NÄYTÄ KAIKKI PÄIVÄN OTTELUT (" + jarjestys.length + ")"} />}
    </div>
  );
}

function TulosKortit({ preds, round, results, dayscores, schedule, rosters, lukittu, logot }) {
  const kohdeMap = Object.fromEntries(round.kohteet.map(g => [g.id, g]));
  const finnit = rosters ? new Set(Object.values(rosters).flatMap(t =>
    t.pelaajat.filter(p => p.maa === "FIN").map(p => String(p.id)))) : new Set();
  const valitut = {};
  preds.forEach(p => { const pl = nykyinenPelaaja(p); if (pl) (valitut[String(pl.id)] = valitut[String(pl.id)] || []).push(p.name); });

  const fiPaivat = {};
  if (dayscores) Object.values(dayscores).flat().forEach(g => {
    const pvm = suomiAika(g.alkaaUTC).pvm;
    (fiPaivat[pvm] = fiPaivat[pvm] || []).push(g);
  });
  const mennytPvm = Object.keys(fiPaivat).sort().reverse()[0] || "";
  const tulevatP = {};
  if (schedule) schedule.ottelut.forEach(g => {
    const pvm = suomiAika(g.alkaaUTC).pvm;
    if (pvm > mennytPvm) (tulevatP[pvm] = tulevatP[pvm] || []).push(g);
  });
  const tulevaPvm = Object.keys(tulevatP).sort()[0] || "";

  return (
    <div>
      <div className="sect" style={{ marginTop: 16 }}>
        <span className="so">Ottelut</span><span className="viiva"></span>
        <span className="meta">FIN = suomalainen · vihreä = osuma</span>
      </div>
      <div className="gridx two">
        <div className="card" style={{ margin: 0 }}>
          <div className="paneeliots">Edelliset · {mennytPvm ? pvmTxt(mennytPvm) : "—"}</div>
          {!dayscores && <div className="note">Kierrosnäkymä aukeaa, kun uusin datahaku (v4) on ajettu.</div>}
          {mennytPvm && <PaivaLohko ottelut={fiPaivat[mennytPvm]} kohdeMap={kohdeMap} preds={preds}
                        lukittu={lukittu} logot={logot} finnit={finnit} valitut={valitut} mennyt={true} />}
        </div>
        <div className="card" style={{ margin: 0 }}>
          <div className="paneeliots">Seuraavat · {tulevaPvm ? pvmTxt(tulevaPvm) : "—"}</div>
          {tulevaPvm ? <PaivaLohko ottelut={tulevatP[tulevaPvm]} kohdeMap={kohdeMap} preds={preds}
                       lukittu={lukittu} logot={logot} finnit={finnit} valitut={valitut} mennyt={false} />
            : <div className="tiny">Ei tulevia otteluita.</div>}
        </div>
      </div>
    </div>
  );
}

function ValitutPorssit({ preds, playerstats, winsMap, logot, nimetMap }) {
  const mestarit = {};
  preds.forEach(p => { if (p.champ) (mestarit[p.champ] = mestarit[p.champ] || []).push(p.name); });
  const mRivit = Object.keys(mestarit).map(ab => ({ ab, valinneet: mestarit[ab], pts: winsMap[ab] || 0 }))
    .sort((a, b) => b.pts - a.pts);
  const pelaajat = {};
  preds.forEach(p => {
    const pl = nykyinenPelaaja(p);
    if (!pl) return;
    const id = String(pl.id);
    if (!pelaajat[id]) pelaajat[id] = { p: pl, valinneet: [], pred: p };
    pelaajat[id].valinneet.push(p.name + (p.player2 ? " (vaihto)" : ""));
  });
  const posTxt = { H: "hyökkääjä", P: "puolustaja", MV: "maalivahti" };
  const pRivit = Object.values(pelaajat).map(r => {
    const id = String(r.p.id);
    const maara = r.p.pos === "MV" ? (playerstats && playerstats.nollapelit[id]) || 0 : (playerstats && playerstats.maalit[id]) || 0;
    const pts = playerstats ? pelaajaPisteet(r.pred, playerstats) : 0;
    return Object.assign({ maara, pts }, r);
  }).sort((a, b) => b.pts - a.pts);
  return (
    <div>
      <div className="sect" style={{ marginTop: 16 }}>
        <span className="so">Veikkauspörssit</span><span className="viiva"></span>
      </div>
      <div className="gridx two">
        <div className="card" style={{ margin: 0 }}>
          <div className="paneeliots">Mestarijoukkueet</div>
          {mRivit.map((r, i) => (
            <div key={r.ab} style={{ padding: "7px 0", borderBottom: "1px solid var(--chipbg)" }}>
              <div className="pelaaja" style={{ border: "none", padding: 0 }}>
                <span className="sija">{i + 1}</span>
                <img className="logo" src={logot[r.ab]} alt="" />
                <b>{nimetMap[r.ab] || r.ab}</b>
                <span className="ppilli">{r.pts} voittoa · {r.pts} p</span>
              </div>
              <div className="valinnutrivi" style={{ marginLeft: 32 }}>Valinnut: {r.valinneet.join(", ")}</div>
            </div>
          ))}
          {mRivit.length === 0 && <div className="tiny">Ei vielä valintoja.</div>}
        </div>
        <div className="card" style={{ margin: 0 }}>
          <div className="paneeliots">Valitut pelaajat</div>
          {pRivit.map((r, i) => (
            <div key={r.p.id} style={{ padding: "7px 0", borderBottom: "1px solid var(--chipbg)" }}>
              <div className="pelaaja" style={{ border: "none", padding: 0 }}>
                <span className="sija">{i + 1}</span>
                <img className="kasvo" src={r.p.kuva} alt="" />
                <b>{r.p.nimi}</b>
                <span className="tiny">{posTxt[r.p.pos]}</span>
                <span className="ppilli">{r.maara} {r.p.pos === "MV" ? "np" : "maalia"} · {fmtP(r.pts)} p</span>
              </div>
              <div className="valinnutrivi" style={{ marginLeft: 32 }}>Valinnut: {r.valinneet.join(", ")}</div>
            </div>
          ))}
          {pRivit.length === 0 && <div className="tiny">Ei vielä valintoja.</div>}
        </div>
      </div>
    </div>
  );
}

function Hero({ round, results, meta, lukittu }) {
  const seurat = ["FLA", "VGK", "DAL", "COL", "EDM", "CAR"];
  const pelattu = round && results ? round.kohteet.filter(g => results.tulokset[g.id]).length : 0;
  const yht = round ? round.kohteet.length : 0;
  return (
    <div className="hero">
      <div className="streak"></div>
      <div className="herorow">
        <div className="htxt">
          <div className="kick">Kaveriporukan kausiveikkaus · Koeversio</div>
          <h1 className="title">NHL-Veikkaus <span className="vuosi">'26–27</span></h1>
          <div className="logostrip">
            {seurat.map(ab => <img key={ab} src={"https://assets.nhle.com/logos/nhl/svg/" + ab + "_light.svg"} alt={ab} />)}
          </div>
        </div>
        <img className="cup" src="stanley-cup.png" alt="Stanley Cup" onError={e => { e.target.style.display = "none"; }} />
      </div>
      <div className="ticker">
        {yht ? "Kierros " + pelattu + "/" + yht + " · " : ""}{meta ? meta.paiva + " · " : ""}1. puolikas {lukittu ? "lukittu" : "auki"}
      </div>
    </div>
  );
}

function SRivi({ t, sija }) {
  const l10 = t.l10Wins != null ? t.l10Wins + "-" + t.l10Losses + "-" + t.l10OtLosses : "";
  return (
    <div className="srivi">
      <div className={"slohko" + (onPOpaikalla(t) ? " po" : "")}>{sija}</div>
      <div className="snimi"><img src={t.teamLogo} alt="" />{t.teamName.default}</div>
      <div className="smono">{t.wins}-{t.losses}-{t.otLosses}</div>
      <div className="smono">{l10}</div>
      <div className="spist">{t.points}</div>
    </div>
  );
}

function DivPaneeli({ nimi, rivit, rajaIndex, rajaTxt }) {
  return (
    <div className="card" style={{ margin: 0 }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
        <div className="paneeliots">{nimi}</div>
        <span className="mono" style={{ fontSize: 8.5, color: "var(--faint)", textTransform: "uppercase" }}>V-H-JH · L10 · P</span>
      </div>
      {rivit.map((t, i) => (
        <div key={t.teamAbbrev.default}>
          <SRivi t={t} sija={i + 1} />
          {i === rajaIndex && <div className="raja">{rajaTxt}</div>}
        </div>
      ))}
    </div>
  );
}

function Divisioonat({ standings }) {
  const divit = {};
  standings.forEach(t => { (divit[t.divisionName] = divit[t.divisionName] || []).push(t); });
  return (
    <div>
      <div className="gridx two" style={{ marginTop: 10 }}>
        {Object.keys(divit).map(dn =>
          <DivPaneeli key={dn} nimi={dn}
            rivit={divit[dn].slice().sort((a, b) => a.divisionSequence - b.divisionSequence)}
            rajaIndex={2} rajaTxt="Top 3" />)}
      </div>
      <div className="mono" style={{ fontSize: 9.5, color: "var(--faint)", textTransform: "uppercase", letterSpacing: ".06em", marginTop: 8 }}>
        Sininen lohko = playoff-paikalla (top 3 tai wild card 1–2)</div>
    </div>
  );
}

function Konferenssit({ standings }) {
  const confit = { E: "Itäinen konferenssi", W: "Läntinen konferenssi" };
  return (
    <div>
      <div className="gridx two" style={{ marginTop: 10 }}>
        {Object.keys(confit).map(c => {
          const joukkueet = standings.filter(t => t.conferenceAbbrev === c);
          const top3 = joukkueet.filter(t => t.divisionSequence <= 3)
            .sort((a, b) => a.divisionAbbrev.localeCompare(b.divisionAbbrev) || a.divisionSequence - b.divisionSequence);
          const loput = joukkueet.filter(t => t.divisionSequence > 3)
            .sort((a, b) => a.wildcardSequence - b.wildcardSequence);
          return <DivPaneeli key={c} nimi={confit[c]} rivit={top3.concat(loput)} rajaIndex={7} rajaTxt="Playoff-raja" />;
        })}
      </div>
      <div className="mono" style={{ fontSize: 9.5, color: "var(--faint)", textTransform: "uppercase", letterSpacing: ".06em", marginTop: 8 }}>
        Sininen lohko = playoff-paikalla · keltainen raja = wild card 2</div>
    </div>
  );
}

function PorssiPaneeli({ otsikko, rivit, yksikko, huomio }) {
  const [auki, setAuki] = useState(false);
  const eka = rivit[0];
  const loput = auki ? rivit.slice(1) : rivit.slice(1, 5);
  if (!rivit.length) return (
    <div className="card" style={{ margin: 0 }}><div className="paneeliots">{otsikko}</div>
      <div className="note">{huomio || "Ei dataa."}</div></div>);
  return (
    <div className="card" style={{ margin: 0 }}>
      <div className="paneeliots">{otsikko}</div>
      <div className="feat">
        <FaceLogo kuva={eka.kuva} logo={eka.logo} koko={52} logoKoko={22} reuna="2px solid var(--blue)" />
        <div>
          <div className="fnimi">{eka.nimi}</div>
          <div className="mono" style={{ fontSize: 9, color: "var(--mut)" }}>{eka.pieni || eka.joukkue || ""}</div>
        </div>
        <div>
          <div className="farvo">{eka.arvo}</div>
          <div className="mono" style={{ fontSize: 8.5, color: "var(--mut)", textAlign: "right", textTransform: "uppercase" }}>{yksikko}</div>
        </div>
      </div>
      <div style={{ position: "relative" }}>
        {loput.map((p, i) => (
          <div key={p.id} className="pelaaja" style={{ padding: "5px 0" }}>
            <span className="sija" style={{ width: 22, fontSize: 13 }}>{i + 2}</span>
            <img className="kasvo" src={p.kuva} alt="" style={{ width: 24, height: 24 }} />
            <b style={{ fontSize: 14 }}>{p.nimi}</b>
            {p.logo && <img src={p.logo} alt="" style={{ width: 14, height: 14 }} />}
            {p.pieni && <span className="mono" style={{ fontSize: 9.5, color: "var(--mut)", marginLeft: "auto" }}>{p.pieni}</span>}
            <span className="arvo" style={{ fontFamily: "'Barlow Condensed'", fontWeight: 800, fontSize: 15, marginLeft: p.pieni ? 8 : "auto" }}>{p.arvo}</span>
          </div>
        ))}
        {!auki && rivit.length > 5 && <div className="haivytys"></div>}
      </div>
      {rivit.length > 5 &&
        <Laajenna auki={auki} onClick={() => setAuki(!auki)} kiinniTxt={"NÄYTÄ TOP " + rivit.length} />}
    </div>
  );
}

function Porssit({ leaders, goalies, goaliestats, playerstats, rosters, standings }) {
  const logot = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.teamLogo]));
  const ga = (id, kartta) => (playerstats && kartta && kartta[String(id)] != null) ? kartta[String(id)] : null;
  const gaTxt = (id) => {
    const g = ga(id, playerstats && playerstats.maalit), a = ga(id, playerstats && playerstats.syotot);
    return (g != null && a != null) ? g + "+" + a : "";
  };
  const skaterRivi = (p) => ({ id: p.id, nimi: p.firstName.default + " " + p.lastName.default,
    kuva: p.headshot, logo: p.teamLogo, joukkue: p.teamAbbrev, arvo: p.value, pieni: gaTxt(p.id) });

  // Suomalaisten pistepörssi rostereista + pistedatasta
  let suomiRivit = [];
  if (rosters && playerstats && playerstats.pisteet) {
    suomiRivit = Object.values(rosters).flatMap(t => t.pelaajat
      .filter(p => p.maa === "FIN" && p.pos !== "MV")
      .map(p => ({ id: p.id, nimi: p.nimi, kuva: p.kuva, logo: logot[t.joukkue], joukkue: t.joukkue,
        arvo: playerstats.pisteet[String(p.id)] || 0, pieni: gaTxt(p.id) })))
      .sort((a, b) => b.arvo - a.arvo).slice(0, 30);
  }

  // Maalivahdit: torjunta-% + GAA + voitot
  let mvRivit = [];
  if (goaliestats && goaliestats.savePctg) {
    const gaaMap = {}, winsMap2 = {};
    (goaliestats.goalsAgainstAverage || goaliestats.goalsAgainstAvg || []).forEach(p => gaaMap[p.id] = p.value);
    (goaliestats.wins || []).forEach(p => winsMap2[p.id] = p.value);
    mvRivit = goaliestats.savePctg.map(p => {
      const gaa = gaaMap[p.id], voitot = winsMap2[p.id];
      const pienet = [];
      if (gaa != null) pienet.push("GAA " + gaa.toFixed(2).replace(".", ","));
      if (voitot != null) pienet.push(voitot + " v");
      return { id: p.id, nimi: p.firstName.default + " " + p.lastName.default, kuva: p.headshot,
        logo: p.teamLogo, joukkue: p.teamAbbrev, arvo: (p.value * 100).toFixed(1).replace(".", ","), pieni: pienet.join(" · ") };
    });
  }

  return (
    <div className="gridx two" style={{ marginTop: 10 }}>
      <PorssiPaneeli otsikko="Pistepörssi" rivit={leaders.points.map(skaterRivi)} yksikko="P" />
      <PorssiPaneeli otsikko="Maalipörssi" rivit={leaders.goals.map(skaterRivi)} yksikko="M" />
      <PorssiPaneeli otsikko="Suomalaisten pistepörssi" rivit={suomiRivit} yksikko="P"
        huomio="Suomalaispörssi aukeaa, kun uusin datahaku (v5) on ajettu." />
      <PorssiPaneeli otsikko="Maalivahdit (torjunta-%)" rivit={mvRivit} yksikko="TOR-%"
        huomio="Maalivahtipörssi aukeaa, kun uusin datahaku (v5) on ajettu." />
    </div>
  );
}

function PelaajaHaku({ pelaajat, value, onChange, placeholder, logot, lukittu }) {
  const [teksti, setTeksti] = useState("");
  const osumat = teksti.trim().length >= 2
    ? pelaajat.filter(p => p.nimi.toLowerCase().includes(teksti.trim().toLowerCase())).slice(0, 8)
    : [];
  if (value) return (
    <FeatPelaaja p={value} logot={logot}
      alarivi={(value.numero ? "#" + value.numero + " · " : "") + value.joukkue + " · " + (posSanat[value.pos] || value.pos)}
      onVaihda={!lukittu ? (() => onChange(null)) : null} />
  );
  return (
    <div className="haku">
      <input style={{ width: "100%" }} value={teksti} placeholder={placeholder || "Hae pelaajaa nimellä (väh. 2 kirjainta)…"}
             onChange={e => setTeksti(e.target.value)} />
      {osumat.length > 0 &&
        <div className="hakulista">
          {osumat.map(p => (
            <div className="hakurivi" key={p.id} onClick={() => { onChange(p); setTeksti(""); }}>
              <img src={p.kuva} alt="" /><b>{p.nimi}</b>
              <span className="tiny">{p.joukkue} · {p.pos}{p.numero ? " · #" + p.numero : ""}</span>
            </div>
          ))}
        </div>}
    </div>
  );
}

function VakioOsa({ round, picks, setPicks, lukittu, logot }) {
  if (!round) return <div className="note">Vakiokierrosta ei ole vielä julkaistu.</div>;
  const vk = ["su", "ma", "ti", "ke", "to", "pe", "la"];
  const kkNimet = { "10": "Lokakuu", "11": "Marraskuu", "12": "Joulukuu", "01": "Tammikuu", "02": "Helmikuu", "03": "Maaliskuu", "04": "Huhtikuu" };
  const merkattu = round.kohteet.filter(g => g.tulos
    ? (picks.tulos[g.id] && picks.tulos[g.id].v != null && picks.tulos[g.id].k != null)
    : !!picks.vakio[g.id]).length;
  const asetaMerkki = (id, m) => { if (lukittu) return;
    setPicks(Object.assign({}, picks, { vakio: Object.assign({}, picks.vakio, { [id]: picks.vakio[id] === m ? null : m }) })); };
  const asetaTulos = (id, kentta, arvo) => { if (lukittu) return;
    const n = arvo === "" ? null : Math.max(0, Math.min(15, parseInt(arvo, 10) || 0));
    const vanha = picks.tulos[id] || { v: null, k: null };
    setPicks(Object.assign({}, picks, { tulos: Object.assign({}, picks.tulos, { [id]: Object.assign({}, vanha, { [kentta]: n }) }) })); };
  let edKk = "", edPvm = "";
  return (
    <div>
      <div className="sect"><span className="so">Vakiokierros 1</span><span className="viiva"></span>
        <span className="edistys">{merkattu}/{round.kohteet.length} KOHDETTA MERKATTU</span></div>
      <div className="epalkki"><div style={{ width: (round.kohteet.length ? Math.round(100 * merkattu / round.kohteet.length) : 0) + "%" }}></div></div>
      <div className="note">Tavalliset kohteet 1X2:lla (1 = kotivoitto varsinaisella ajalla, X = jatkoaika/voittolaukaukset, 2 = vierasvoitto varsinaisella ajalla; 3 p). Lauantain <b>tuloskohteessa</b> veikataan lopputulos: täysosuma 4 p · voittaja + toisen joukkueen maalit 3 p · voittaja 2 p.</div>
      {round.kohteet.map(g => {
        const kk = g.pvm.slice(5, 7), pvmTxt = vk[new Date(g.pvm).getUTCDay()] + " " + g.pvm.slice(8, 10) + "." + kk + ".";
        const kkOtsikko = kk !== edKk ? <div className="divh">{kkNimet[kk] || kk}</div> : null;
        edKk = kk;
        const naytaPvm = g.pvm !== edPvm; edPvm = g.pvm;
        const t = picks.tulos[g.id] || {};
        return (
          <div key={g.id}>
            {kkOtsikko}
            {naytaPvm && <div className="vpaiva">{pvmTxt}</div>}
            <div className={"vrivi" + (g.tulos ? " tuloskohde" : "")}>
              <span className="aika">{g.klo}</span>
              <span className="pari"><img src={logot[g.vieras]} alt="" />{g.vieras} <span className="at">@</span> <img src={logot[g.koti]} alt="" />{g.koti}</span>
              {g.tulos ? (
                <span className="merkit" style={{ alignItems: "center", gap: 7 }}>
                  <span className="tulospilli">TULOSKOHDE</span>
                  <input className="tulosinput" inputMode="numeric" placeholder={g.vieras} disabled={lukittu}
                         value={t.v == null ? "" : t.v} onChange={e => asetaTulos(g.id, "v", e.target.value.replace(/\D/g, ""))} />
                  <span style={{ color: "var(--mut)" }}>–</span>
                  <input className="tulosinput" inputMode="numeric" placeholder={g.koti} disabled={lukittu}
                         value={t.k == null ? "" : t.k} onChange={e => asetaTulos(g.id, "k", e.target.value.replace(/\D/g, ""))} />
                </span>
              ) : (
                <span className="merkit">
                  {["1", "X", "2"].map(m =>
                    <button key={m} disabled={lukittu} className={"merkki" + (picks.vakio[g.id] === m ? " val" : "")}
                            onClick={() => asetaMerkki(g.id, m)}>{m}</button>)}
                </span>
              )}
            </div>
          </div>
        );
      })}
      <div className="selite">1 = KOTIVOITTO · X = JATKOAIKA/VL · 2 = VIERASVOITTO · 3 P / OIKEA</div>
    </div>
  );
}

function VaihtoOsa({ picks, setPicks, nimi, rosters, playerstats, setViesti, setTallennettu, posNimi }) {
  const [uusiId, setUusiId] = useState("");
  const [varmistus, setVarmistus] = useState(false);
  const rosteri = (rosters[picks.champ] ? rosters[picks.champ].pelaajat : [])
    .filter(p => String(p.id) !== String(picks.player.id));
  const uusi = rosteri.find(p => String(p.id) === uusiId);
  const tee = () => {
    const p2 = Object.assign({ joukkue: picks.champ }, uusi);
    const snap = { p1: pelaajaStat(picks.player, playerstats), p2: pelaajaStat(p2, playerstats) };
    const paivitys = { player2: p2, vaihtoPvm: new Date().toISOString().slice(0, 10), snap: snap };
    db.collection("nhlpredictions").doc(nimi.trim()).update(paivitys)
      .then(() => { setPicks(Object.assign({}, picks, paivitys)); setTallennettu("Pelaajanvaihto tehty!"); setVarmistus(false); })
      .catch(e => setViesti("Vaihto epäonnistui: " + e.message));
  };
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
      <select value={uusiId} onChange={e => { setUusiId(e.target.value); setVarmistus(false); }}>
        <option value="">— valitse uusi pelaaja ({picks.champ}) —</option>
        {["H", "P", "MV"].map(pos =>
          <optgroup key={pos} label={posNimi[pos]}>
            {rosteri.filter(p => p.pos === pos).slice().sort((a, b) => a.nimi.localeCompare(b.nimi))
              .map(p => <option key={p.id} value={String(p.id)}>{p.nimi}{p.numero ? " #" + p.numero : ""}</option>)}
          </optgroup>)}
      </select>
      {uusi && !varmistus && <button className="ghost" onClick={() => setVarmistus(true)}>Vaihda pelaajaan {lyhytNimi(uusi.nimi)}</button>}
      {uusi && varmistus &&
        <button className="act" onClick={tee}>Vahvista lopullinen vaihto → {lyhytNimi(uusi.nimi)}</button>}
    </div>
  );
}

const posSanat = { H: "Hyökkääjä", P: "Puolustaja", MV: "Maalivahti" };

      {teams.map(t => {
        const ab = t.teamAbbrev.default;
        const val = multi ? valitut.includes(ab) : value === ab;
        return (
          <button key={ab} type="button" title={t.teamName.default}
                  className={"vsolu" + (val ? " val" : "")}

            <img src={t.teamLogo} alt={t.teamName.default} />
            <span className="vab">{ab}</span>
            {multi && val && <span className="vok">✓</span>}

        );

function Veikkaus({ standings, rosters, round, lukittu, config, playerstats }) {
  const [nimi, setNimi] = useState("");
  const [pin, setPin] = useState("");
  const [kirjautunut, setKirjautunut] = useState(false);
  const [viesti, setViesti] = useState("");
  const [tallennettu, setTallennettu] = useState("");
  const tyhja = { poE: [], poW: [], div: {}, pres: "", artRoss: null, finn: null, champ: "", player: null, vakio: {}, tulos: {}, viimeinen: "", allstar: "", player2: null, vaihtoPvm: null, snap: null };
  const [osa, setOsa] = useState("kausi");
  const [picks, setPicks] = useState(tyhja);

  const joukkueet = standings.slice().sort((a, b) => a.teamName.default.localeCompare(b.teamName.default));
  const logot = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.teamLogo]));
  const divit = {};
  standings.forEach(t => { (divit[t.divisionName] = divit[t.divisionName] || []).push(t); });
  const kaikkiPelaajat = Object.values(rosters).flatMap(t =>
    t.pelaajat.map(p => Object.assign({ joukkue: t.joukkue }, p)));

  const [osallistujat, setOsallistujat] = useState([]);
  const [avattava, setAvattava] = useState("");   // palaajan valitsema nimi (PIN-kysely auki)
  useEffect(() => {
    db.collection("nhlpredictions").get()
      .then(qs => setOsallistujat(qs.docs.map(d => d.id).sort((a, b) => a.localeCompare(b, "fi"))))
      .catch(() => {});
  }, [kirjautunut]);

  const aloitaUusi = () => {
    const n = nimi.trim();
    if (!n) { setViesti("Anna nimi."); return; }
    if (osallistujat.some(o => o.toLowerCase() === n.toLowerCase())) {
      setViesti("Tämä nimi on jo käytössä — jos se olet sinä, valitse nimesi alta kohdasta \u201dPalaatko muokkaamaan\u201d."); return;
    }
    if (!/^\d{4}$/.test(pin)) { setViesti("Keksi 4-numeroinen PIN."); return; }
    if (lukittu) { setViesti("Veikkaus on lukittu — uusia osallistujia ei voi enää lisätä."); return; }
    setViesti(""); setPicks(tyhja); setKirjautunut(true);
  };

  const avaaVanha = () => {
    if (!/^\d{4}$/.test(pin)) { setViesti("PIN on 4 numeroa."); return; }
    setViesti("");
    db.collection("nhlpredictions").doc(avattava).get().then(snap => {
      if (!snap.exists) { setViesti("Veikkausta ei löytynyt."); return; }
      const d = snap.data();
      if (d.pin !== pin) { setViesti("Väärä PIN."); return; }
      setNimi(avattava);
      setPicks({
        poE: d.poE || [], poW: d.poW || [], div: d.div || {}, pres: d.pres || "",
        artRoss: d.artRoss || null, finn: d.finn || null, champ: d.champ || "", player: d.player || null,
        vakio: d.vakio || {}, tulos: d.tulos || {}, viimeinen: d.viimeinen || "", allstar: d.allstar || "",
        player2: d.player2 || null, vaihtoPvm: d.vaihtoPvm || null, snap: d.snap || null
      });
      setAvattava(""); setKirjautunut(true);
    }).catch(e => setViesti("Yhteysvirhe: " + e.message));
  };

  const togglePO = (t) => {
    if (lukittu) return;
    const avain = t.conferenceAbbrev === "E" ? "poE" : "poW";
    const lista = picks[avain];
    const ab = t.teamAbbrev.default;
    let uusi;
    if (lista.includes(ab)) uusi = lista.filter(x => x !== ab);
    else { if (lista.length >= 8) return; uusi = lista.concat([ab]); }
    setPicks(Object.assign({}, picks, { [avain]: uusi }));
  };

  const asetaChamp = (ab) => {
    if (lukittu) return;
    const p = Object.assign({}, picks, { champ: ab });
    if (picks.player && picks.player.joukkue !== ab) p.player = null; // pelaaja mestarijoukkueesta!
    setPicks(p);
  };

  const puutteet = [];
  if (picks.poE.length < 8) puutteet.push("Itä: " + picks.poE.length + "/8 playoff-joukkuetta");
  if (picks.poW.length < 8) puutteet.push("Länsi: " + picks.poW.length + "/8 playoff-joukkuetta");
  if (Object.keys(picks.div).filter(k => picks.div[k]).length < 4) puutteet.push("Divisioonavoittajat");
  if (!picks.pres) puutteet.push("Presidents' Trophy");
  if (!picks.artRoss) puutteet.push("Pistepörssin voittaja");
  if (!picks.finn) puutteet.push("Paras suomalainen");
  if (!picks.champ) puutteet.push("Oma mestari");
  if (!picks.player) puutteet.push("Oma pelaaja");
  if (!picks.viimeinen) puutteet.push("NHL:n viimeinen");
  if (!picks.allstar) puutteet.push("All-Star-voittaja");
  const vakioMerkattu = round ? round.kohteet.filter(g => g.tulos
    ? (picks.tulos[g.id] && picks.tulos[g.id].v != null && picks.tulos[g.id].k != null)
    : !!picks.vakio[g.id]).length : 0;
  if (round && vakioMerkattu < round.kohteet.length) puutteet.push("Vakiokohteita " + vakioMerkattu + "/" + round.kohteet.length);

  const tallenna = () => {
    if (lukittu) return;
    setTallennettu("");
    const doc = Object.assign({ name: nimi.trim(), pin: pin, savedAt: new Date().toISOString() }, picks);
    db.collection("nhlpredictions").doc(nimi.trim()).set(doc)
      .then(() => setTallennettu("TALLENNETTU " + new Date().toLocaleTimeString("fi-FI", { hour: "2-digit", minute: "2-digit" }) + " — VOIT MUOKATA LUKITUKSEEN ASTI"))
      .catch(e => setViesti("Tallennus epäonnistui: " + e.message));
  };

  const mestariJoukkue = picks.champ ? standings.find(t => t.teamAbbrev.default === picks.champ) : null;
  const mestariRosteri = picks.champ && rosters[picks.champ] ? rosters[picks.champ].pelaajat : [];
  const posNimi = { H: "Hyökkääjät (0,5 p/maali)", P: "Puolustajat (2 p/maali)", MV: "Maalivahdit (6 p/nollapeli)" };

  if (!kirjautunut && avattava) return (
    <div className="card">
      <h2>🔒 Avaa veikkaus: {avattava}</h2>
      <div className="tiny" style={{ marginBottom: 10 }}>Syötä PIN-koodisi päästäksesi katsomaan ja muokkaamaan veikkaustasi.</div>
      <div className="kirjaudu">
        <input type="password" inputMode="numeric" autoFocus placeholder="PIN" value={pin}
               onChange={e => setPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
               onKeyDown={e => { if (e.key === "Enter") avaaVanha(); }} style={{ width: 110 }} />
        <button className="act" onClick={avaaVanha}>Avaa</button>
        <button className="ghost" onClick={() => { setAvattava(""); setPin(""); setViesti(""); }}>Peruuta</button>
      </div>
      {viesti && <div className="note" style={{ color: "var(--amb)" }}>{viesti} Jos olet unohtanut PIN-koodisi, järjestäjä voi nollata sen.</div>}
    </div>
  );

  if (!kirjautunut) return (
    <div className="card">
      <h2>Kuka olet?</h2>
      <div className="note">Näin veikkaat: aloita uutena veikkaajana, tee valintasi ja tallenna. Voit palata muokkaamaan milloin vain lukitukseen asti. Tarkemmat säännöt Säännöt-välilehdellä.</div>
      <div className="vgrid2">
        <div className="vpaneeli">
          <div className="vpotsikko">Uusi veikkaus</div>
          <div className="vpkuvaus">Nimi + nelinumeroinen PIN — sillä palaat muokkaamaan.</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <input className="vinput" value={nimi} onChange={e => setNimi(e.target.value)}
                   placeholder="Etunimi (+ sukunimen alkukirjain)" style={{ minWidth: 150, flex: 1 }} />
            <input className="vinput mono" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
                   inputMode="numeric" placeholder="PIN" style={{ width: 80 }} />
            <button className="vnappi" onClick={aloitaUusi}>Aloita ›</button>
          </div>
          <div className="tiny" style={{ marginTop: 8 }}>Paina PIN mieleen — tarvitset sitä aina, kun palaat muokkaamaan.</div>
        </div>
        {osallistujat.length > 0 &&
          <div className="vpaneeli">
            <div className="vpotsikko">Palaatko muokkaamaan?</div>
            <div className="vpkuvaus">Valitse nimesi — PIN kysytään seuraavaksi.</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {osallistujat.map(o =>
                <button key={o} className="nimichip" onClick={() => { setAvattava(o); setPin(""); setViesti(""); }}>
                  {o} <span className="lukko">🔒</span></button>)}
            </div>
          </div>}
      </div>
      {lukittu && <div className="note" style={{ color: "var(--amb)" }}>🔒 Veikkaukset on lukittu — uusia ei voi lisätä, mutta omaa voi katsella.</div>}
      {viesti && <div className="note" style={{ color: "var(--amb)" }}>{viesti}</div>}
    </div>
  );

  const askeleet = [
    ["1 PLAYOFFIT", "k-playoffit", picks.poE.length === 8 && picks.poW.length === 8],
    ["2 DIVARIT", "k-divarit", Object.keys(picks.div).filter(k => picks.div[k]).length >= 4],
    ["3 PRES. TROPHY", "k-pres", !!picks.pres],
    ["3B VIIMEINEN", "k-viimeinen", !!picks.viimeinen],
    ["4 ART ROSS", "k-artross", !!picks.artRoss],
    ["5 SUOMALAINEN", "k-suomalainen", !!picks.finn],
    ["6 MESTARI", "k-mestari", !!picks.champ],
    ["7 PELAAJA", "k-pelaaja", !!picks.player]
  ];

  return (
    <div className="card">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <h2 style={{ margin: 0 }}>Veikkaus — {nimi.trim()}</h2>
        <button className="ghost" onClick={() => { setKirjautunut(false); setTallennettu(""); }}>Kirjaudu ulos</button>
      </div>
      <div style={{ margin: "10px 0" }}>
        <div className="seg">
          <button className={"segb" + (osa === "kausi" ? " on" : "")} onClick={() => setOsa("kausi")}>Kausiveikkaus</button>

            <div style={{ minWidth: 0 }}>

            {!lukittu && <button className="vaihdanappi" onClick={() => asetaChamp("")}>VAIHDA</button>}

      </div>

      <div className="vpan" id="k-pelaaja">
        <div className="otsrivi"><div className="ots">7 · Oma pelaaja</div><span className="pinfo">H 0,5 / P 2 P/MAALI · MV 6 P/NOLLAPELI</span>
          <span className={"vtila " + (picks.player ? "valmis" : "kesken")}>{picks.player ? "VALITTU ✓" : "VALITSE"}</span></div>
        <div className="kuv">Pakko valita mestarijoukkueestasi! Hyökkääjä 0,5 p/maali · puolustaja 2 p/maali · maalivahti 6 p/nollapeli.</div>

            <select disabled={lukittu} value={picks.player ? String(picks.player.id) : ""}

                <optgroup key={pos} label={posNimi[pos]}>
                  {mestariRosteri.filter(p => p.pos === pos).slice().sort((a, b) => a.nimi.localeCompare(b.nimi))
                    .map(p => <option key={p.id} value={String(p.id)}>{p.nimi}{p.numero ? " #" + p.numero : ""}</option>)}

                alarivi={(picks.player.numero ? "#" + picks.player.numero + " · " : "") + posSanat[picks.player.pos]
                  + " · " + (picks.player.pos === "H" ? "0,5 P/MAALI" : picks.player.pos === "P" ? "2 P/MAALI" : "6 P/NOLLAPELI")}
                onVaihda={!lukittu ? (() => setPicks(Object.assign({}, picks, { player: null }))) : null} />}
          </div>}
      </div>

      <div className="vpan" id="k-allstar">
        <div className="otsrivi"><div className="ots">8 · All-Star 2027 -voittajamaa</div><span className="pinfo">8 P</span>
          <span className={"vtila " + (picks.allstar ? "valmis" : "kesken")}>{picks.allstar ? picks.allstar.toUpperCase() + " ✓" : "VALITSE"}</span></div>
        <div className="kuv">Viisi joukkuetta (5.–6.2.2027, UBS Arena): kuka voittaa 3v3-turnauksen? 8 p. Tämän kohteen voi täyttää ja muuttaa aina All-Star-viikonloppuun asti, vaikka muu veikkaus olisi jo lukittu.</div>
        <div className={"vsolugrid" + (picks.allstar ? " valinta" : "") + ((config && config.lockedAS) ? " lukossa" : "")}>
          {[["Kanada", "ca", "CAN"], ["Suomi", "fi", "FIN"], ["Ruotsi", "se", "SWE"], ["USA", "us", "USA"], ["Maailma", null, "MAA"]].map(([maa, koodi, lyh]) =>
            <button key={maa} type="button" title={maa}
                    className={"vsolu as" + (picks.allstar === maa ? " val" : "")}
                    onClick={() => {
                      if (config && config.lockedAS) return;
                      setPicks(Object.assign({}, picks, { allstar: picks.allstar === maa ? "" : maa }));
                    }}>
              {koodi ? <img className="lippu" src={"assets/flags/" + koodi + ".svg"} alt={maa} />
                     : <span className="maapallo">W</span>}
              <span className="vab">{lyh}</span>
            </button>)}
        </div>
        {lukittu && !(config && config.lockedAS) &&
          <div style={{ marginTop: 10 }}>
            <button className="ghost" onClick={() => {
              db.collection("nhlpredictions").doc(nimi.trim()).update({ allstar: picks.allstar })
                .then(() => setTallennettu("All-Star-veikkaus tallennettu!"))
                .catch(e => setViesti("Tallennus epäonnistui: " + e.message));
            }}>Tallenna All-Star-veikkaus</button>
