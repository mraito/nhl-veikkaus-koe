        (!config || !config.tradeDL || new Date().toISOString().slice(0, 10) <= config.tradeDL) &&
        <div className="vpan"><div className="otsrivi"><div className="ots">Pelaajanvaihto — käytettävissä 1 krt</div></div>
          <div className="kuv">Voit vaihtaa oman pelaajasi kerran kauden aikana toiseen saman joukkueen ({picks.champ}) pelaajaan. Ikkuna sulkeutuu NHL:n trade deadlineen{config && config.tradeDL ? " (" + config.tradeDL + ")" : ""}. Vaihto on lopullinen — käytetty mahdollisuus ei palaudu, vaikka uusikin pelaaja loukkaantuisi. Pisteet: {lyhytNimi(picks.player.nimi)} vaihtoon asti, uusi pelaaja siitä eteenpäin (uuden pelipaikan kertoimella).</div>
          <VaihtoOsa picks={picks} setPicks={setPicks} nimi={nimi} rosters={rosters} playerstats={playerstats}
                     setViesti={setViesti} setTallennettu={setTallennettu} posNimi={posNimi} />
        </div>}
      {picks.player2 &&
        <div className="vpan"><div className="otsrivi"><div className="ots">Pelaajanvaihto — käytetty</div></div>
          <div className="kuv">{lyhytNimi(picks.player.nimi)} → {lyhytNimi(picks.player2.nimi)} ({picks.vaihtoPvm}). Ei enää vaihto-oikeutta.</div>
        </div>}
      </div>}

      <div className="osio">
        {puutteet.length > 0
          ? <div className="puuttuu">Vielä puuttuu: {puutteet.join(" · ")}. Voit silti tallentaa ja jatkaa myöhemmin.</div>
          : <div className="okvihrea">Kaikki valinnat tehty! ✓</div>}
        {viesti && <div className="note" style={{ color: "var(--amb)" }}>{viesti}</div>}
        <div className="tiny" style={{ marginTop: 8 }}>Muista tallentaa! Valinnat eivät tallennu itsestään. Ennen lukitusta voit muokata veikkaustasi rajattomasti kirjautumalla samalla nimellä ja PIN-koodilla.</div>
      </div>
      <div className="tallennuspalkki">
        {!lukittu
          ? <button className="tnappi" onClick={tallenna}>Tallenna veikkaus</button>
          : <span className="ttila lukossa">🔒 LUKITTU — VALINNAT EIVÄT ENÄÄ MUUTU</span>}
        {tallennettu && <span className="ttila ok">✓ {tallennettu}</span>}
        {osa === "vakio" && round && <span className="tedistys">{vakioMerkattu}/{round.kohteet.length} MERKATTU</span>}
      </div>
    </div>
  );
}

function Jarjestaja({ config, standings, onTallennettu }) {
  const [avattu, setAvattu] = useState(false);
  const [pin, setPin] = useState("");
  const [viesti, setViesti] = useState("");
  const [lomake, setLomake] = useState(null);
  const eiPinia = !config || !config.pin || !/^\d{6}$/.test(config.pin);

  const avaa = () => {
    if (!eiPinia && pin !== config.pin) { setViesti("Väärä PIN."); return; }
    if (eiPinia && !/^\d{6}$/.test(pin)) { setViesti("Aseta 6-numeroinen järjestäjä-PIN."); return; }
    setViesti("");
    setLomake({
      pin: eiPinia ? pin : config.pin,
      stake: config && config.stake != null ? config.stake : 10,
      locked1: !!(config && config.locked1),
      lockedAS: !!(config && config.lockedAS),
      tradeDL: (config && config.tradeDL) || "2027-03-08",
      tiedote: (config && config.tiedote) || "",
      tiedoteAsti: (config && config.tiedoteAsti) || "",
      allstarTulos: (config && config.allstarTulos) || "",
      viimeinenTulos: (config && config.viimeinenTulos) || ""
    });
    setAvattu(true);
  };

  const tallenna = () => {
    db.collection("nhl27").doc("config").set(lomake, { merge: true })
      .then(() => { onTallennettu(lomake); setViesti("Asetukset tallennettu " + new Date().toLocaleTimeString("fi-FI")); })
      .catch(e => setViesti("Tallennus epäonnistui: " + e.message));
  };

  if (!avattu) return (
    <div className="card">
      <h2>Järjestäjä</h2>
      {eiPinia && <div className="note">Järjestäjä-PIN ei ole käytössä (uusi tai nollattu). Keksi 6-numeroinen PIN — se tallentuu, kun tallennat asetukset ensimmäisen kerran.</div>}
      <div className="kirjaudu">
        <input type="password" inputMode="numeric" placeholder="Järjestäjä-PIN" value={pin}
               onChange={e => setPin(e.target.value.replace(/\D/g, "").slice(0, 6))}
               onKeyDown={e => { if (e.key === "Enter") avaa(); }} style={{ width: 140 }} />
        <button className="act" onClick={avaa}>Avaa</button>
      </div>
      {viesti && <div className="note" style={{ color: "var(--amb)" }}>{viesti}</div>}
    </div>
  );

  const joukkueet = (standings || []).slice().sort((a, b) => a.teamName.default.localeCompare(b.teamName.default));
  return (
    <div className="card">
      <h2>Järjestäjän asetukset</h2>
      <div className="osio" style={{ borderTop: "none", paddingTop: 0 }}><div className="ots">Lukitukset</div>
        <div style={{ display: "flex", gap: 18, flexWrap: "wrap", marginTop: 6 }}>
          <label style={{ display: "flex", gap: 7, alignItems: "center", cursor: "pointer" }}>
            <input type="checkbox" checked={lomake.locked1}
                   onChange={e => setLomake(Object.assign({}, lomake, { locked1: e.target.checked }))} style={{ width: 18, height: 18 }} />
            Kausiveikkaus + 1. puolikas lukittu</label>
          <label style={{ display: "flex", gap: 7, alignItems: "center", cursor: "pointer" }}>
            <input type="checkbox" checked={lomake.lockedAS}
                   onChange={e => setLomake(Object.assign({}, lomake, { lockedAS: e.target.checked }))} style={{ width: 18, height: 18 }} />
            All-Star-veikkaus lukittu</label>
        </div>
        <div className="tiny" style={{ marginTop: 6 }}>Lukitus tekee veikkauksista katselutilan ja tuo muiden valinnat näkyviin. All-Star lukitaan erikseen ennen 5.2.2027.</div>
      </div>
      <div className="osio"><div className="ots">Panostus &amp; trade deadline</div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 6 }}>
          <div className="kentta"><span className="lab">Panostus (€)</span>
            <input inputMode="numeric" value={lomake.stake} style={{ width: 90 }}
                   onChange={e => setLomake(Object.assign({}, lomake, { stake: parseInt(e.target.value, 10) || 0 }))} /></div>
          <div className="kentta"><span className="lab">Trade deadline (pelaajanvaihdon takaraja)</span>
            <input type="date" value={lomake.tradeDL}
                   onChange={e => setLomake(Object.assign({}, lomake, { tradeDL: e.target.value }))} /></div>
        </div>
      </div>
      <div className="osio"><div className="ots">Tiedote (näkyy uutiskortissa Tulostaulukon ylälaidassa)</div>
        <div className="kuv">Tyhjä teksti = ei tiedotetta. Tiedote poistuu automaattisesti "Näkyy asti" -päivän jälkeen.</div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 6, alignItems: "flex-end" }}>
          <div className="kentta" style={{ flex: "1 1 260px" }}><span className="lab">Tiedote</span>
            <input maxLength={200} value={lomake.tiedote} placeholder="esim. Muistakaa täyttää toisen puolikkaan vakiot!"
                   onChange={e => setLomake(Object.assign({}, lomake, { tiedote: e.target.value }))} style={{ width: "100%" }} /></div>
          <div className="kentta"><span className="lab">Näkyy asti</span>
            <input type="date" value={lomake.tiedoteAsti}
                   onChange={e => setLomake(Object.assign({}, lomake, { tiedoteAsti: e.target.value }))} /></div>
        </div>
        {lomake.tiedote.trim() &&
          <div className="urivi" style={{ border: "1px solid var(--line2)", borderRadius: 8, marginTop: 10 }}>
            <span className="utagi am">TIEDOTE</span>
            <span>{lomake.tiedote.trim()} <span className="mono" style={{ fontSize: 9, color: "var(--faint)" }}>— JÄRJESTÄJÄ</span></span>
            {lomake.tiedoteAsti && <span className="upvm">näkyy {lomake.tiedoteAsti.slice(8,10)}.{lomake.tiedoteAsti.slice(5,7)}. asti</span>}
          </div>}
      </div>
      <div className="osio"><div className="ots">Erikoiskohteiden tulokset (syötetään kun ratkeavat)</div>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 6 }}>
          <div className="kentta"><span className="lab">All-Star 2027 -voittaja</span>
            <select value={lomake.allstarTulos}
                    onChange={e => setLomake(Object.assign({}, lomake, { allstarTulos: e.target.value }))}>
              <option value="">— ei vielä ratkennut —</option>
              {["Kanada", "Suomi", "Ruotsi", "USA", "Maailma"].map(m => <option key={m} value={m}>{m}</option>)}
            </select></div>
          <div className="kentta"><span className="lab">NHL:n viimeinen joukkue</span>
            <select value={lomake.viimeinenTulos}
                    onChange={e => setLomake(Object.assign({}, lomake, { viimeinenTulos: e.target.value }))}>
              <option value="">— ei vielä ratkennut —</option>
              {joukkueet.map(t => <option key={t.teamAbbrev.default} value={t.teamAbbrev.default}>{t.teamName.default}</option>)}
            </select></div>
        </div>
      </div>
      <div className="osio">
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <button className="act" onClick={tallenna}>Tallenna asetukset</button>
          <button className="ghost" onClick={() => { setAvattu(false); setPin(""); }}>Sulje</button>
          {viesti && <span className="okvihrea">{viesti}</span>}
        </div>
      </div>
    </div>
  );
}

function Tulossa({ nimi }) {
  return (
    <div className="card tulossa">
      <div className="iso">{nimi}</div>
      <div>Tämä osio rakennetaan seuraavaksi. Koeversio etenee pala kerrallaan.</div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("tulos");
  const [sarjaNakyma, setSarjaNakyma] = useState("div");
  const [standings, setStandings] = useState(null);
  const [scores, setScores] = useState(null);
  const [leaders, setLeaders] = useState(null);
  const [goalies, setGoalies] = useState(null);
  const [meta, setMeta] = useState(null);
  const [rosters, setRosters] = useState(null);
  const [config, setConfig] = useState({ locked1: false });
  const [round, setRound] = useState(null);
  const [results, setResults] = useState(null);
  const [checkpoints, setCheckpoints] = useState(null);
  const [playerstats, setPlayerstats] = useState(null);
  const [preds, setPreds] = useState([]);
  const [schedule, setSchedule] = useState(null);
  const [dayscores, setDayscores] = useState(null);
  const [goaliestats, setGoaliestats] = useState(null);
  const [virhe, setVirhe] = useState("");

  useEffect(() => {
    Promise.all(["standings", "scores", "leaders", "goalies", "meta", "rosters"].map(n =>
      fetch("data/" + n + ".json").then(r => { if (!r.ok) throw new Error("data/" + n + ".json: HTTP " + r.status); return r.json(); })
    )).then(([st, sc, ld, gl, me, ro]) => {
      setStandings(st.standings); setScores(sc); setLeaders(ld); setGoalies(gl); setMeta(me); setRosters(ro);
    }).catch(e => setVirhe(e.message));
    fetch("data/round1.json").then(r => r.ok ? r.json() : null).then(setRound).catch(() => setRound(null));
    fetch("data/results1.json").then(r => r.ok ? r.json() : null).then(setResults).catch(() => setResults(null));
    fetch("data/checkpoints.json").then(r => r.ok ? r.json() : null).then(setCheckpoints).catch(() => setCheckpoints(null));
    fetch("data/playerstats.json").then(r => r.ok ? r.json() : null).then(setPlayerstats).catch(() => setPlayerstats(null));
    fetch("data/schedule.json").then(r => r.ok ? r.json() : null).then(setSchedule).catch(() => setSchedule(null));
    fetch("data/dayscores.json").then(r => r.ok ? r.json() : null).then(setDayscores).catch(() => setDayscores(null));
    fetch("data/goaliestats.json").then(r => r.ok ? r.json() : null).then(setGoaliestats).catch(() => setGoaliestats(null));
    db.collection("nhlpredictions").get()
      .then(qs => setPreds(qs.docs.map(d => d.data())))
      .catch(() => {});
    db.collection("nhl27").doc("config").get()
      .then(snap => { if (snap.exists) setConfig(snap.data()); })
      .catch(() => {});
  }, []);

  const TABS = [["tulos", "Tulostaulukko"], ["sarja", "Sarjataulukko"], ["veikkaus", "Veikkaus"], ["saannot", "Säännöt"], ["org", "Järjestäjä"]];

  return (
    <div className="wrap">
      <Hero round={round} results={results} meta={meta} lukittu={!!config.locked1} />
      <div className="tabs">
        {TABS.map(([id, nimi]) =>
          <button key={id} className={"tab" + (tab === id ? " on" : "")} onClick={() => setTab(id)}>{nimi}</button>)}
      </div>

      {virhe && <div className="note" style={{ color: "var(--red)" }}>Datan lataus epäonnistui: {virhe}</div>}

      {tab === "tulos" && (
        <div>
          {standings && round ? (() => {
            const logot = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.teamLogo]));
            const nimetMap = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.teamName.default]));
            const winsMap = Object.fromEntries(standings.map(t => [t.teamAbbrev.default, t.wins]));
            return (
              <div>
                <Uutiskortti preds={preds} config={config} dayscores={dayscores} rosters={rosters} />
                <Tulostaulukko preds={preds} round={round} results={results} checkpoints={checkpoints}
                               playerstats={playerstats} standings={standings} stake={config.stake != null ? config.stake : 10} config={config} />
                <TulosKortit preds={preds} round={round} results={results} dayscores={dayscores} schedule={schedule} rosters={rosters} lukittu={!!config.locked1} logot={logot} />
                <ValitutPorssit preds={preds} playerstats={playerstats} winsMap={winsMap} logot={logot} nimetMap={nimetMap} />
              </div>
            );
          })() : <div className="card tiny">Ladataan…</div>}
        </div>
      )}

      {tab === "sarja" && (
        <div>
          <div className="sect">
            <span className="so">Sarjataulukko</span><span className="viiva"></span>
            <div className="seg">
              {[["div", "Divisioonat"], ["conf", "Konferenssit"], ["porssi", "Pörssit"]].map(([id, nimi]) =>
                <button key={id} className={"segb" + (sarjaNakyma === id ? " on" : "")} onClick={() => setSarjaNakyma(id)}>{nimi}</button>)}
            </div>
            <span className="meta">31.1.2026</span>
          </div>
          {!standings ? <div className="tiny" style={{ marginTop: 10 }}>Ladataan…</div> : (
            <div>
              {sarjaNakyma === "div" && <Divisioonat standings={standings} />}
              {sarjaNakyma === "conf" && <Konferenssit standings={standings} />}
              {sarjaNakyma === "porssi" && leaders && goalies && <Porssit leaders={leaders} goalies={goalies} goaliestats={goaliestats} playerstats={playerstats} rosters={rosters} standings={standings} />}
            </div>
          )}
        </div>
      )}

      {tab === "veikkaus" && (standings && rosters ? <Veikkaus standings={standings} rosters={rosters} round={round} lukittu={!!config.locked1} config={config} playerstats={playerstats} /> : <div className="card tiny">Ladataan…</div>)}
      {tab === "saannot" && (
        <div className="card">
          <h2>Säännöt</h2>
          <div className="osio" style={{ borderTop: "none", paddingTop: 0 }}><div className="ots">Kausiveikkaus</div>
            <div className="kuv">Täytetään ennen kauden alkua (lukitus ennen avauskierrosta). 16 playoff-joukkuetta: 2 p/oikea. Divisioonavoittajat: 3 p/oikea. Presidents' Trophy: 5 p. NHL:n viimeiseksi jäävä joukkue: 5 p. Pistepörssin voittaja: 10 p oikein, 5 p jos top 3. Paras suomalainen pistemies: 8 p oikein, 4 p jos top 3. All-Star 2027 -turnauksen (5.–6.2.2027; Kanada, Suomi, Ruotsi, USA, Maailma) voittajamaa: 8 p — tämän kohteen voi täyttää ja muuttaa All-Star-viikonloppuun asti.</div></div>
          <div className="osio"><div className="ots">Kuukausipisteet</div>
            <div className="kuv">Jokaisen kuukauden viimeisenä päivänä (loka–maaliskuu): +1 p jokaisesta omasta playoff-veikkauksesta, joka on sillä hetkellä playoff-paikalla (top 3 divisioonassa tai wild card 1–2). Kertyneet pisteet jäävät voimaan, vaikka joukkue putoaisi myöhemmin.</div></div>
          <div className="osio"><div className="ots">Vakiokierrokset (1X2)</div>
            <div className="kuv">Kausi jaetaan kahteen puolikkaaseen (loka–joulu ja tammi–huhti), jotka veikataan erikseen ennen puolikkaan alkua. Noin yksi kohde per pelipäivä, lauantaisin kaksi. Merkit: 1 = kotivoitto varsinaisella peliajalla, X = ottelu ratkeaa jatkoajalla tai voittolaukauksilla, 2 = vierasvoitto varsinaisella peliajalla. 3 p / oikea merkki. Lauantain aikaisemmin alkava peli on viikon TULOSKOHDE: siihen veikataan lopputulos (jatkoaika ja voittolaukaukset mukaan lukien, NHL:n virallisen tuloksen mukaan) — täysosuma 4 p, oikea voittaja + toisen joukkueen maalimäärä 3 p, oikea voittaja 2 p. Järjestäjä voi lisäksi merkitä erikoistapahtumia (esim. Winter Classic) tuplakohteiksi (×2).</div></div>
          <div className="osio"><div className="ots">Oma mestari &amp; oma pelaaja</div>
            <div className="kuv">Mestari: 1 p / voitto runkosarjassa, 2 p / voitto playoffeissa. Pelaaja on pakko valita omasta mestarijoukkueesta: hyökkääjä 0,5 p/maali · puolustaja 2 p/maali · maalivahti 6 p/nollapeli. Vain maalit ja nollapelit lasketaan, ei syöttöjä. Pisteet seuraavat pelaajaa koko kauden, vaikka hän vaihtaisi seuraa. Pelaajan saa vaihtaa YHDEN kerran kauden aikana toiseen saman mestarijoukkueen pelaajaan, NHL:n trade deadlineen asti — vanhan pelaajan pisteet vaihtoon asti jäävät voimaan, ja uuden pelaajan pisteet (uuden pelipaikan kertoimella) lasketaan vaihdosta eteenpäin. Käytetty vaihto ei palaudu, vaikka uusikin pelaaja loukkaantuisi.</div></div>
          <div className="osio"><div className="ots">Playoff-bracket</div>
            <div className="kuv">Kun 16 playoff-joukkuetta on selvillä huhtikuussa, veikataan pudotuspelikaavio kierros kierrokselta. Pisteytys tarkentuu ennen playoffseja.</div></div>
          <div className="osio"><div className="ots">Potti ja lukitukset</div>
            <div className="kuv">Kaikki pisteet lasketaan yhteen — yksi kärkitaulu, yksi palkintojenjako kauden lopussa: 1. sija 60 %, 2. sija 30 %, 3. sija 10 % potista. Tasatilanteessa sijojen palkinnot jaetaan tasan. Kolme lukitusta: kausiveikkaus + 1. puolikas (lokakuu), 2. puolikas (vuodenvaihde), playoff-bracket (huhtikuu). Ennen lukitusta muiden veikkaukset eivät näy kenellekään. Tulokset ja pisteet päivittyvät automaattisesti joka aamu.</div></div>
        </div>
      )}
      {tab === "org" && <Jarjestaja config={config} standings={standings} onTallennettu={setConfig} />}

      <footer>NHL-Veikkaus '26–27 · Data: NHL API · Päivittyy joka aamu{meta ? " · testipäivä " + meta.paiva : ""}</footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
